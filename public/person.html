<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Person — MLX Autonode</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Source Serif 4', 'Georgia', serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --bg: #FAF9F7; --surface: #FFFFFF; --surface-warm: #F7F5F2; --surface-cool: #F2F4F8;
  --ink: #1A1A1A; --ink-2: #4A4A4A; --ink-3: #7A7A7A; --ink-4: #AAAAAA;
  --rule: #E0DDD8; --rule-bold: #C8C4BE;
  --blue: #2563EB; --blue-soft: #EBF1FE;
  --emerald: #0D7A50; --emerald-soft: #E8F5EE;
  --amber: #B45309; --amber-soft: #FEF7E8;
  --rose: #C41D3E; --rose-soft: #FDF0F2;
  --radius: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }

/* Masthead */
.masthead { background: var(--surface); border-bottom: 2px solid var(--ink); padding: 0 clamp(14px, 3vw, 40px); position: sticky; top: 0; z-index: 100; }
.masthead-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; max-width: 1320px; margin: 0 auto; }
.mast-logo { font-family: var(--serif); font-size: 22px; font-weight: 600; text-decoration: none; color: var(--ink); }
.mast-logo em { font-style: italic; color: var(--ink-3); }
.mast-nav { display: flex; gap: 2px; }
.mast-nav a { font-size: 13px; font-weight: 500; color: var(--ink-3); text-decoration: none; padding: 6px 14px; border-radius: 6px; }
.mast-nav a:hover { color: var(--ink); background: var(--surface-warm); }
.mast-nav a.active { color: var(--ink); background: var(--surface-warm); font-weight: 600; }

/* Page */
.page { max-width: 1320px; margin: 0 auto; padding: 32px clamp(14px, 3vw, 40px) 60px; overflow: hidden; }
.back { font-size: 13px; color: var(--ink-3); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; }
.back:hover { color: var(--ink); }

/* Profile */
.profile { display: flex; gap: 20px; align-items: flex-start; padding-bottom: 24px; margin-bottom: 32px; border-bottom: 2px solid var(--ink); }
.avatar { width: 68px; height: 68px; border-radius: 50%; background: var(--surface-cool); border: 2px solid var(--rule); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 24px; font-weight: 600; color: var(--ink-3); flex-shrink: 0; }
.avatar.noted { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.enrich-btn { background: var(--surface-warm); border: 1px solid var(--rule); border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink-2); font-family: var(--sans); white-space: nowrap; transition: all 0.15s; align-self: flex-start; }
.enrich-btn:hover { background: #EBF1FE; border-color: var(--blue); color: var(--blue); }
.enrich-btn.loading { opacity: 0.6; pointer-events: none; }
.enrich-btn.done { background: #E6F5EC; border-color: var(--emerald); color: var(--emerald); }
.pinfo { flex: 1; min-width: 0; }
.pname { font-family: var(--serif); font-size: clamp(22px, 4vw, 28px); font-weight: 600; line-height: 1.2; overflow-wrap: break-word; }
.ptitle { font-size: 15px; color: var(--ink-2); margin-top: 3px; overflow-wrap: break-word; }
.pmeta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; font-size: 13px; color: var(--ink-3); }
.pmeta a { color: var(--blue); text-decoration: none; font-weight: 500; }
.pmeta a:hover { text-decoration: underline; }
.ptags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px; background: var(--surface-warm); color: var(--ink-3); white-space: nowrap; }
.tag.seniority { background: var(--amber-soft); color: var(--amber); }
.tag.source { background: var(--emerald-soft); color: var(--emerald); }
.tag.client { background: var(--amber-soft); color: var(--amber); }
.tag.industry { background: var(--blue-soft); color: var(--blue); }
.pcontact { flex-shrink: 0; }
.ci { font-size: 13px; color: var(--ink-3); margin-bottom: 5px; }
.ci a { color: var(--blue); text-decoration: none; word-break: break-all; }
.ci a:hover { text-decoration: underline; }

/* Card-based grid layout */
.grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
.card { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-card); overflow: hidden; min-width: 0; }
.card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.card-title { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.card-count { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
.card-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 12px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

/* Section cards — backwards compat with .sec */
.sec { margin-bottom: 0; }
.sec-rule { height: 3px; background: var(--ink); margin-bottom: 8px; }
.sec-rule.thin { height: 1px; background: var(--rule); margin-bottom: 8px; }
.sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.sec-title { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.sec-count { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
.sec-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 12px; }

/* Notes */
.note { background: var(--surface-warm); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; overflow: hidden; }
.note-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
.note-subj { font-family: var(--serif); font-size: 14px; font-weight: 600; min-width: 0; overflow-wrap: break-word; }
.note-date { font-size: 10px; color: var(--ink-4); font-family: var(--mono); white-space: nowrap; }
.note-body { font-size: 12px; color: var(--ink-2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; max-height: 180px; overflow-y: auto; }
.note-q { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; white-space: nowrap; }
.note-q.high { background: var(--emerald-soft); color: var(--emerald); }
.note-q.medium { background: var(--amber-soft); color: var(--amber); }
.note-intel { margin-top: 8px; padding: 8px 10px; background: var(--surface-cool); border-radius: 6px; border-left: 3px solid var(--blue); font-size: 11px; color: var(--ink-2); line-height: 1.5; word-break: break-word; }
.note-intel b { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); display: block; margin-bottom: 3px; }

/* Signal cards */
.sig { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; transition: border-color 0.15s; overflow: hidden; }
.sig:hover { border-color: var(--blue); }
.sig-icon { font-size: 15px; flex-shrink: 0; }
.sig-info { flex: 1; min-width: 0; }
.sig-hl { font-size: 13px; font-weight: 500; overflow-wrap: break-word; word-break: break-word; }
.sig-det { font-size: 11px; color: var(--ink-3); margin-top: 2px; overflow-wrap: break-word; word-break: break-word; }
.sig-conf { font-family: var(--mono); font-size: 11px; color: var(--ink-4); flex-shrink: 0; }

/* Interaction cards */
.ix { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; transition: border-color 0.15s; overflow: hidden; cursor: pointer; }
.ix:hover { border-color: var(--blue); }
.ix-icon { font-size: 14px; flex-shrink: 0; }
.ix-info { flex: 1; min-width: 0; overflow: hidden; }
.ix-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ix-title:hover { white-space: normal; overflow-wrap: break-word; }
.ix-det { font-size: 11px; color: var(--ink-3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; word-break: break-word; }
.ix-preview { max-height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ix-full { word-break: break-word; overflow-wrap: break-word; max-height: 300px; overflow-y: auto; }
.ix-date { font-size: 10px; color: var(--ink-4); font-family: var(--mono); flex-shrink: 0; white-space: nowrap; }

/* Sidebar cards */
.ss { margin-bottom: 0; }
.ss-rule { height: 3px; background: var(--ink); margin-bottom: 8px; }
.ss-title { font-family: var(--serif); font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; }
.st { padding: 10px; text-align: center; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); transition: background 0.15s; }
.st:hover { background: var(--surface-warm); }
.st:nth-child(2n) { border-right: none; }
.st:nth-last-child(-n+2) { border-bottom: none; }
.st-v { font-family: var(--serif); font-size: 18px; font-weight: 600; }
.st-l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-4); font-weight: 600; }

.coll { display: flex; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--rule); cursor: pointer; }
.coll:hover { background: var(--surface-warm); margin: 0 -6px; padding: 6px; border-radius: 4px; }
.coll:last-child { border-bottom: none; }
.coll-av { width: 28px; height: 28px; border-radius: 50%; background: var(--surface-cool); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--ink-3); flex-shrink: 0; }
.coll-info { min-width: 0; }
.coll-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.coll-title { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.empty { text-align: center; padding: 20px; color: var(--ink-4); font-size: 13px; }
.loading { text-align: center; padding: 60px; color: var(--ink-3); }

/* Inline edit */
.editable { cursor: pointer; position: relative; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
.editable:hover { border-bottom-color: var(--blue); }
.editable:hover::after { content: ' ✏️'; font-size: 10px; }
.edit-input { border: 1.5px solid var(--blue); border-radius: 4px; padding: 4px 8px; font-family: var(--sans); font-size: inherit; color: var(--ink); background: var(--surface); outline: none; width: 100%; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.edit-input:focus { border-color: var(--blue); }
.save-indicator { display: inline-block; font-size: 11px; color: var(--emerald); margin-left: 6px; opacity: 0; transition: opacity 0.3s; }
.save-indicator.show { opacity: 1; }

@media (min-width: 1024px) {
  .card-grid { grid-template-columns: 1fr 1fr 300px; }
  .card-grid > .card:first-child { grid-column: 1 / 3; }
}
@media (max-width: 768px) {
  .profile { flex-direction: column; gap: 14px; }
  .pcontact { text-align: left; }
  .mast-nav { display: none; }
}
@media (max-width: 480px) {
  .avatar { width: 52px; height: 52px; font-size: 18px; }
  .note { padding: 12px 14px; }
}
</style>
</head>
<body>
<header class="masthead"><div class="masthead-inner">
  <a href="/index.html" class="mast-logo">MLX <em>Autonode</em></a>
  <nav class="mast-nav"><a href="/index.html">Signals</a><a href="/people.html" class="active">People</a><a href="/companies.html">Companies</a><a href="/dispatches.html">Dispatch</a><a href="/placements.html">Revenue</a></nav>
  <div style="width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">JT</div>
</div></header>

<div class="page">
  <a href="/people.html" class="back">← People</a>
  <div id="app"><div class="loading">Loading dossier…</div></div>
</div>

<script>
const TK=localStorage.getItem('ml_token');if(!TK)location.href='/index.html';
async function api(u){try{const r=await fetch(u,{headers:{Authorization:'Bearer '+TK}});if(r.status===401){location.href='/index.html';return null}if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||r.statusText)}return r.json()}catch(e){document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:var(--ink-3)"><h3>Could not load dossier</h3><p>'+e.message+'</p><a href="/people.html" style="color:var(--blue)">Back to people</a></div>';throw e}}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function fmtD(t){return t?new Date(t).toLocaleDateString('en-AU',{year:'numeric',month:'short',day:'numeric'}):'—'}
function ago(t){if(!t)return'';const m=Math.floor((Date.now()-new Date(t))/6e4);if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';const d=Math.floor(h/24);return d<30?d+'d':fmtD(t)}

const SI={capital_raising:'💰',ma_activity:'🔗',product_launch:'🚀',partnership:'🤝',geographic_expansion:'🌐',restructuring:'⚙️',leadership_change:'👤',layoffs:'📉',strategic_hiring:'👥'};
const II={email:'✉️',call:'📞',meeting:'🤝',linkedin_message:'💼',whatsapp:'💬',sms:'📱'};
// Override with Lucide if loaded
if(typeof signalIcon==='function'){Object.keys(SI).forEach(k=>{SI[k]='<span style="display:inline-flex;color:var(--ink-3)">'+signalIcon(k)+'</span>'});Object.keys(II).forEach(k=>{II[k]='<span style="display:inline-flex;color:var(--ink-3)">'+interactionIcon(k)+'</span>'})}
const id=new URLSearchParams(location.search).get('id');if(!id)location.href='/people.html';

(async()=>{
const p=await api('/api/people/'+id);if(!p)return;
document.title=(p.full_name||'Person')+' — MLX Autonode';
const ini=(p.full_name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const notes=p.research_notes||[];const ixs=p.interactions||[];const csig=p.company_signals||[];const psig=p.person_signals||[];const colls=p.colleagues||[];const s=p.interaction_stats||{};

const coId=p.company_id_linked||p.current_company_id||'';

const tags=[];
if(p.seniority_level)tags.push('<a class="tag seniority" href="/people.html?seniority='+encodeURIComponent(p.seniority_level)+'" style="text-decoration:none">'+esc(p.seniority_level)+'</a>');
if(p.source)tags.push('<span class="tag source">'+esc(p.source)+'</span>');
if(p.company_is_client)tags.push('<a class="tag client" href="/company.html?id='+coId+'" style="text-decoration:none">CLIENT CO</a>');
(Array.isArray(p.industries)?p.industries:[]).slice(0,3).forEach(i=>tags.push('<a class="tag industry" href="/people.html?industry='+encodeURIComponent(i)+'" style="text-decoration:none">'+esc(i)+'</a>'));
(Array.isArray(p.expertise_tags)?p.expertise_tags:[]).slice(0,4).forEach(t=>tags.push('<a class="tag" href="/people.html?q='+encodeURIComponent(t)+'" style="text-decoration:none">'+esc(t)+'</a>'));

const ct=[];
if(p.email)ct.push('<div class="ci">✉️ <a href="mailto:'+esc(p.email)+'">'+esc(p.email)+'</a></div>');
if(p.linkedin_url)ct.push('<div class="ci">🔗 <a href="'+esc(p.linkedin_url)+'" target="_blank">LinkedIn</a></div>');
if(p.phone)ct.push('<div class="ci">📞 '+esc(p.phone)+'</div>');
let h='<div class="profile">';
h+='<div class="avatar'+(notes.length?' noted':'')+'">'+ini+'</div>';
h+='<div class="pinfo">';
h+='<div class="pname"><span class="editable" onclick="editField(this,\'full_name\',\''+esc(p.full_name)+'\')">'+esc(p.full_name)+'</span></div>';
h+='<div class="ptitle"><span class="editable" onclick="editField(this,\'current_title\',\''+esc(p.current_title||p.headline||'')+'\')">'+esc(p.current_title||p.headline||'Add title')+'</span></div>';
h+='<div class="pmeta">';
h+='<span>🏢 <span class="editable" onclick="editField(this,\'current_company_name\',\''+esc(p.current_company_name||'')+'\')">'+esc(p.current_company_name||'Add company')+'</span>'+(p.company_sector?' · '+esc(p.company_sector):'')+'</span>';
if(p.location)h+='<span>📍 <span class="editable" onclick="editField(this,\'location\',\''+esc(p.location)+'\')">'+esc(p.location)+'</span></span>';
else h+='<span>📍 <span class="editable" onclick="editField(this,\'location\',\'\')">Add location</span></span>';
if(p.functional_area)h+='<span>⚡ '+esc(p.functional_area)+'</span>';
h+='</div>';
if(tags.length)h+='<div class="ptags">'+tags.join('')+'</div>';
h+='</div>';
h+='<div class="pcontact">';
h+='<div class="ci">✉️ <span class="editable" onclick="editField(this,\'email\',\''+esc(p.email||'')+'\')">'+esc(p.email||'Add email')+'</span></div>';
if(p.linkedin_url)h+='<div class="ci">🔗 <a href="'+esc(p.linkedin_url)+'" target="_blank">LinkedIn</a></div>';
else h+='<div class="ci">🔗 <span class="editable" onclick="editField(this,\'linkedin_url\',\'\')">Add LinkedIn</span></div>';
if(p.phone)h+='<div class="ci">📞 <span class="editable" onclick="editField(this,\'phone\',\''+esc(p.phone)+'\')">'+esc(p.phone)+'</span></div>';
h+='</div>';
h+='<button class="enrich-btn" id="enrichBtn" onclick="enrichPerson()">🔄 Refresh &amp; Enrich</button>';
const isPrivate = p.visibility === 'private';
h+='<button class="enrich-btn'+(isPrivate?' done':'')+'" id="privacyBtn" onclick="togglePrivacy()" style="margin-top:6px">'+(isPrivate?'🔒 Private':'🌐 Visible to team')+'</button>';
h+='</div>';

h+='<div class="card-grid">';

// Research Notes
h+='<div class="card"><div class="sec"><div class="card-head"><div class="card-title">Research Notes</div><div class="card-count">'+notes.length+' NOTES</div></div><div class="card-sub">Internal intelligence</div>';
if(!notes.length)h+='<div class="empty">No research notes yet</div>';
else notes.forEach(n=>{
  const qb=n.note_quality?'<span class="note-q '+(n.note_quality==='high'?'high':'medium')+'">'+n.note_quality+'</span>':'';
  let intel='';
  if(n.extracted_intelligence&&typeof n.extracted_intelligence==='object'){
    const e=Object.entries(n.extracted_intelligence).filter(([k,v])=>v&&String(v).length).map(([k,v])=>'<strong>'+esc(k.replace(/_/g,' '))+':</strong> '+esc(typeof v==='object'?JSON.stringify(v):String(v)));
    if(e.length)intel='<div class="note-intel"><b>Extracted Intelligence</b>'+e.join(' · ')+'</div>';
  }
  h+='<div class="note"><div class="note-top"><div class="note-subj">'+esc(n.subject||'Research Note')+qb+'</div><div class="note-date">'+fmtD(n.interaction_at||n.created_at)+'</div></div><div class="note-body">'+esc(n.summary||'')+'</div>'+intel+'</div>';
});
h+='</div></div>'; // close sec + card

// Company Signals
if(csig.length){
  h+='<div class="card"><div class="sec"><div class="card-head"><div class="card-title">Company Signals</div><div class="card-count">'+csig.length+'</div></div><div class="card-sub">Signals about '+esc(p.current_company_name||'employer')+'</div>';
  csig.forEach(x=>{
    h+='<div class="sig" style="cursor:pointer" onclick="location.href=\'/company.html?id='+coId+'\'"><div class="sig-icon">'+(SI[x.signal_type]||'📡')+'</div><div class="sig-info"><div class="sig-hl">'+esc(x.evidence_summary||x.signal_type.replace(/_/g,' '))+'</div><div class="sig-det">'+esc(x.signal_type.replace(/_/g,' '))+' · '+ago(x.detected_at)+' · '+(x.triage_status||'new')+'</div></div><div class="sig-conf">'+Math.round((x.confidence_score||0)*100)+'%</div></div>';
  });
  h+='</div></div>'; // close sec + card
}

// Interactions
if(ixs.length){
  h+='<div class="card"><div class="sec"><div class="card-head"><div class="card-title">Interactions</div><div class="card-count">'+ixs.length+'</div></div><div class="card-sub">Emails, calls, meetings</div>';
  const ixLimit = 8;
  const ixVisible = ixs.slice(0, ixLimit);
  const ixHidden = ixs.slice(ixLimit);
  ixVisible.forEach(i=>{
    const intBadge=i.is_internal?'<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#F3EEFE;color:#6D28D9;font-weight:600;margin-left:4px">INTERNAL</span>':'';
    const sensBadge=i.sensitivity==='sensitive'?'<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#FDF0F2;color:#C41D3E;font-weight:600;margin-left:4px">SENSITIVE</span>':'';

  if(ixHidden.length){

      h+='<div class="ix" style="cursor:pointer" onclick="toggleIx(this)"><div class="ix-icon">'+(II[i.interaction_type]||'📋')+'</div><div class="ix-info"><div class="ix-title">'+esc(i.subject||i.summary||i.interaction_type)+'</div>'+(i.email_snippet?'<div class="ix-det ix-preview">'+esc(String(i.email_snippet).slice(0,200))+'</div>':'')+'<div class="ix-det">'+esc(i.interaction_type.replace(/_/g,' '))+(i.direction?' · '+i.direction:'')+'</div></div><div class="ix-date">'+fmtD(i.interaction_at)+'</div></div>';

async function enrichPerson() {
  const btn = document.getElementById('enrichBtn');
  if (!btn) return;
  btn.className = 'enrich-btn loading';
  btn.textContent = '⏳ Enriching…';
  try {
    const id = new URLSearchParams(location.search).get('id');
    const r = await fetch('/api/people/' + id + '/enrich', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + localStorage.getItem('ml_token') },
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    btn.className = 'enrich-btn done';
    const msgs = [];
    const r2 = data.results;
    if (r2.ezekia_profile?.updated_fields) msgs.push('Profile: ' + r2.ezekia_profile.updated_fields.length + ' fields');
    else if (r2.ezekia_profile?.error) msgs.push('Profile: ' + r2.ezekia_profile.error);
    if (r2.ezekia_projects?.found_in > 0) msgs.push('Projects: ' + r2.ezekia_projects.found_in + ' found');
    else if (r2.ezekia_projects?.message) msgs.push('Projects: ' + r2.ezekia_projects.message);
    if (r2.gmail?.new_stored > 0) msgs.push('Gmail: +' + r2.gmail.new_stored + ' new');
    else if (r2.gmail?.messages_found > 0) msgs.push('Gmail: ' + r2.gmail.messages_found + ' found');
    else if (r2.gmail?.message) msgs.push('Gmail: ' + r2.gmail.message);
    if (r2.signals?.new_signals > 0) msgs.push('Signals: +' + r2.signals.new_signals);
    else if (r2.signals?.mentions_found > 0) msgs.push(r2.signals.mentions_found + ' mentions');
    if (r2.web?.company_signals > 0) msgs.push(r2.web.company_signals + ' co signals');
    if (r2.embedding?.message) msgs.push('Embedded');
    btn.textContent = '✅ ' + (msgs.length ? msgs.join(' · ') : 'Up to date');
    setTimeout(() => { window.scrollTo(0, 0); location.reload(); }, 3000);
  } catch (e) {
    btn.className = 'enrich-btn';
    btn.textContent = '❌ ' + e.message;
    setTimeout(() => { btn.textContent = '🔄 Refresh & Enrich'; }, 3000);
  }
}

async function togglePrivacy() {
  const btn = document.getElementById('privacyBtn');
  const isCurrentlyPrivate = btn.textContent.includes('Private');
  const newVisibility = isCurrentlyPrivate ? 'company' : 'private';

  if (!isCurrentlyPrivate && !confirm('Mark this contact as private? Only you will be able to see them.')) return;

  try {
    const res = await fetch('/api/people/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TK },
      body: JSON.stringify({ visibility: newVisibility })
    });
    if (!res.ok) throw new Error('Failed');

    if (newVisibility === 'private') {
      btn.textContent = '🔒 Private';
      btn.className = 'enrich-btn done';
    } else {
      btn.textContent = '🌐 Visible to team';
      btn.className = 'enrich-btn';
    }
  } catch (e) {
    alert('Failed to update privacy: ' + e.message);
  }
}

async function editField(el, field, currentValue) {
  // Replace the element with an input
  const original = el.innerHTML;
  const input = document.createElement('input');
  input.className = 'edit-input';
  input.value = currentValue;
  input.placeholder = 'Enter ' + field.replace(/_/g, ' ');
  el.innerHTML = '';
  el.appendChild(input);
  el.classList.remove('editable');
  input.focus();
  input.select();

  const save = async () => {
    const newValue = input.value.trim();
    if (newValue === currentValue) {
      el.innerHTML = original;
      el.classList.add('editable');
      el.onclick = () => editField(el, field, currentValue);
      return;
    }

    try {
      const res = await fetch('/api/people/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TK },
        body: JSON.stringify({ [field]: newValue })
      });
      if (!res.ok) throw new Error('Save failed');

      el.textContent = newValue || 'Add ' + field.replace(/_/g, ' ');
      el.classList.add('editable');
      el.onclick = () => editField(el, field, newValue);

      // Flash save indicator
      const indicator = document.createElement('span');
      indicator.className = 'save-indicator show';
      indicator.textContent = 'Saved';
      el.appendChild(indicator);
      setTimeout(() => indicator.remove(), 1500);
    } catch (e) {
      el.innerHTML = original;
      el.classList.add('editable');
      el.onclick = () => editField(el, field, currentValue);
      alert('Failed to save: ' + e.message);
    }
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { el.innerHTML = original; el.classList.add('editable'); el.onclick = () => editField(el, field, currentValue); }
  });
}

function scrollToSection(title) {
  const els = document.querySelectorAll('.sec-title');
  for (const el of els) {
    if (el.textContent.trim() === title) {
      el.closest('.sec').scrollIntoView({ behavior: 'smooth', block: 'start' });
      el.closest('.sec').style.outline = '2px solid var(--blue)';
      setTimeout(() => el.closest('.sec').style.outline = '', 1500);
      return;
    }
  }
}

function toggleIx(el) {
  const preview = el.querySelector('.ix-preview');
  const fulls = el.querySelectorAll('.ix-full');
  if (preview) {
    const showing = fulls[0] && fulls[0].style.display !== 'none';
    if (preview) preview.style.display = showing ? '' : 'none';
    fulls.forEach(f => f.style.display = showing ? 'none' : 'block');
  }
}
