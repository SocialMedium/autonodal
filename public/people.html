<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Person — MitchelLake Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Source Serif 4', 'Georgia', serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --bg: #FAF9F7; --surface: #FFFFFF; --surface-warm: #F7F5F2; --surface-cool: #F2F4F8;
  --ink: #1A1A1A; --ink-2: #4A4A4A; --ink-3: #7A7A7A; --ink-4: #AAAAAA;
  --rule: #E0DDD8; --rule-bold: #C8C4BE;
  --blue: #2563EB; --blue-soft: #EBF1FE;
  --emerald: #0D7A50; --emerald-soft: #E8F5EE;
  --amber: #B45309; --amber-soft: #FEF7E8;
  --rose: #C41D3E; --rose-soft: #FDF0F2;
  --radius: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }

/* Masthead */
.masthead { background: var(--surface); border-bottom: 2px solid var(--ink); padding: 0 clamp(14px, 3vw, 40px); position: sticky; top: 0; z-index: 100; }
.masthead-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; max-width: 1320px; margin: 0 auto; }
.mast-logo { font-family: var(--serif); font-size: 22px; font-weight: 600; text-decoration: none; color: var(--ink); }
.mast-logo em { font-style: italic; color: var(--ink-3); }
.mast-nav { display: flex; gap: 2px; }
.mast-nav a { font-size: 13px; font-weight: 500; color: var(--ink-3); text-decoration: none; padding: 6px 14px; border-radius: 6px; }
.mast-nav a:hover { color: var(--ink); background: var(--surface-warm); }
.mast-nav a.active { color: var(--ink); background: var(--surface-warm); font-weight: 600; }

/* Page */
.page { max-width: 1320px; margin: 0 auto; padding: 32px clamp(14px, 3vw, 40px) 60px; overflow: hidden; }
.back { font-size: 13px; color: var(--ink-3); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; }
.back:hover { color: var(--ink); }

/* Profile */
.profile { display: flex; gap: 20px; align-items: flex-start; padding-bottom: 24px; margin-bottom: 32px; border-bottom: 2px solid var(--ink); }
.avatar { width: 68px; height: 68px; border-radius: 50%; background: var(--surface-cool); border: 2px solid var(--rule); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 24px; font-weight: 600; color: var(--ink-3); flex-shrink: 0; }
.avatar.noted { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.enrich-btn { background: var(--surface-warm); border: 1px solid var(--rule); border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink-2); font-family: var(--sans); white-space: nowrap; transition: all 0.15s; align-self: flex-start; }
.enrich-btn:hover { background: #EBF1FE; border-color: var(--blue); color: var(--blue); }
.enrich-btn.loading { opacity: 0.6; pointer-events: none; }
.enrich-btn.done { background: #E6F5EC; border-color: var(--emerald); color: var(--emerald); }
.pinfo { flex: 1; min-width: 0; }
.pname { font-family: var(--serif); font-size: clamp(22px, 4vw, 28px); font-weight: 600; line-height: 1.2; overflow-wrap: break-word; }
.ptitle { font-size: 15px; color: var(--ink-2); margin-top: 3px; overflow-wrap: break-word; }
.pmeta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; font-size: 13px; color: var(--ink-3); }
.pmeta a { color: var(--blue); text-decoration: none; font-weight: 500; }
.pmeta a:hover { text-decoration: underline; }
.ptags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px; background: var(--surface-warm); color: var(--ink-3); white-space: nowrap; }
.tag.seniority { background: var(--amber-soft); color: var(--amber); }
.tag.source { background: var(--emerald-soft); color: var(--emerald); }
.tag.client { background: var(--amber-soft); color: var(--amber); }
.tag.industry { background: var(--blue-soft); color: var(--blue); }
.pcontact { flex-shrink: 0; }
.ci { font-size: 13px; color: var(--ink-3); margin-bottom: 5px; }
.ci a { color: var(--blue); text-decoration: none; word-break: break-all; }
.ci a:hover { text-decoration: underline; }

/* Grid */
.grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 0; }
.main { padding-right: 32px; border-right: 1px solid var(--rule); min-width: 0; }
.side { padding-left: 28px; min-width: 0; }

/* Sections */
.sec { margin-bottom: 32px; }
.sec-rule { height: 3px; background: var(--ink); margin-bottom: 8px; }
.sec-rule.thin { height: 1px; background: var(--rule); margin-bottom: 8px; }
.sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.sec-title { font-family: var(--serif); font-size: 19px; font-weight: 600; }
.sec-count { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
.sec-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 12px; }

/* Notes */
.note { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--shadow-card); overflow: hidden; }
.note-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
.note-subj { font-family: var(--serif); font-size: 15px; font-weight: 600; min-width: 0; overflow-wrap: break-word; }
.note-date { font-size: 10px; color: var(--ink-4); font-family: var(--mono); white-space: nowrap; }
.note-body { font-size: 13px; color: var(--ink-2); line-height: 1.65; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; max-height: 280px; overflow-y: auto; }
.note-q { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; white-space: nowrap; }
.note-q.high { background: var(--emerald-soft); color: var(--emerald); }
.note-q.medium { background: var(--amber-soft); color: var(--amber); }
.note-intel { margin-top: 10px; padding: 10px 12px; background: var(--surface-cool); border-radius: 6px; border-left: 3px solid var(--blue); font-size: 12px; color: var(--ink-2); line-height: 1.55; word-break: break-word; }
.note-intel b { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); display: block; margin-bottom: 3px; }

/* Signal rows */
.sig { padding: 9px 0; border-bottom: 1px solid var(--rule); display: flex; gap: 10px; align-items: flex-start; }
.sig-icon { font-size: 15px; flex-shrink: 0; }
.sig-info { flex: 1; min-width: 0; }
.sig-hl { font-size: 13px; font-weight: 500; overflow-wrap: break-word; }
.sig-det { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
.sig-conf { font-family: var(--mono); font-size: 12px; color: var(--ink-4); flex-shrink: 0; }

/* Interaction rows */
.ix { padding: 9px 0; border-bottom: 1px solid var(--rule); display: flex; gap: 10px; align-items: flex-start; }
.ix-icon { font-size: 14px; flex-shrink: 0; }
.ix-info { flex: 1; min-width: 0; }
.ix-title { font-size: 13px; font-weight: 500; overflow-wrap: break-word; }
.ix-det { font-size: 12px; color: var(--ink-3); margin-top: 1px; overflow-wrap: break-word; }
.ix-date { font-size: 10px; color: var(--ink-4); font-family: var(--mono); flex-shrink: 0; white-space: nowrap; }

/* Side */
.ss { margin-bottom: 24px; }
.ss-rule { height: 3px; background: var(--ink); margin-bottom: 8px; }
.ss-title { font-family: var(--serif); font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; }
.st { padding: 11px; text-align: center; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.st:nth-child(2n) { border-right: none; }
.st:nth-last-child(-n+2) { border-bottom: none; }
.st-v { font-family: var(--serif); font-size: 20px; font-weight: 600; }
.st-l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-4); font-weight: 600; }

.coll { display: flex; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--rule); cursor: pointer; }
.coll:hover { background: var(--surface-warm); margin: 0 -6px; padding: 6px; border-radius: 4px; }
.coll:last-child { border-bottom: none; }
.coll-av { width: 28px; height: 28px; border-radius: 50%; background: var(--surface-cool); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--ink-3); flex-shrink: 0; }
.coll-info { min-width: 0; }
.coll-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.coll-title { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.empty { text-align: center; padding: 20px; color: var(--ink-4); font-size: 13px; }
.loading { text-align: center; padding: 60px; color: var(--ink-3); }

@media (max-width: 1024px) {
  .grid { grid-template-columns: 1fr; }
  .main { padding-right: 0; border-right: none; }
  .side { padding-left: 0; margin-top: 32px; padding-top: 24px; border-top: 2px solid var(--ink); }
}
@media (max-width: 768px) {
  .profile { flex-direction: column; gap: 14px; }
  .pcontact { text-align: left; }
  .mast-nav { display: none; }
}
@media (max-width: 480px) {
  .avatar { width: 52px; height: 52px; font-size: 18px; }
  .note { padding: 12px 14px; }
}
</style>
</head>
<body>
<header class="masthead"><div class="masthead-inner">
  <a href="/" class="mast-logo">Mitchel<em>Lake</em> Signal</a>
  <nav class="mast-nav"><a href="/">Signals</a><a href="/people.html" class="active">People</a><a href="/companies.html">Companies</a><a href="/placements.html">Revenue</a></nav>
  <div style="width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">JT</div>
</div></header>

<div class="page">
  <a href="/people.html" class="back">← People</a>
  <div id="app"><div class="loading">Loading dossier…</div></div>
</div>

<script>
const TK=localStorage.getItem('ml_token');if(!TK)location.href='/';
async function api(u){const r=await fetch(u,{headers:{Authorization:'Bearer '+TK}});if(r.status===401){location.href='/';return null}if(!r.ok)throw new Error(r.statusText);return r.json()}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function fmtD(t){return t?new Date(t).toLocaleDateString('en-AU',{year:'numeric',month:'short',day:'numeric'}):'—'}
function ago(t){if(!t)return'';const m=Math.floor((Date.now()-new Date(t))/6e4);if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';const d=Math.floor(h/24);return d<30?d+'d':fmtD(t)}

const SI={capital_raising:'💰',ma_activity:'🔗',product_launch:'🚀',partnership:'🤝',geographic_expansion:'🌐',restructuring:'⚙️',leadership_change:'👤',layoffs:'📉',strategic_hiring:'👥'};
const II={email:'✉️',call:'📞',meeting:'🤝',linkedin_message:'💼',whatsapp:'💬',sms:'📱'};
const id=new URLSearchParams(location.search).get('id');if(!id)location.href='/people.html';

(async()=>{
const p=await api('/api/people/'+id);if(!p)return;
document.title=(p.full_name||'Person')+' — MitchelLake';
const ini=(p.full_name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const notes=p.research_notes||[];const ixs=p.interactions||[];const csig=p.company_signals||[];const psig=p.person_signals||[];const colls=p.colleagues||[];const s=p.interaction_stats||{};

const tags=[];
if(p.seniority_level)tags.push('<span class="tag seniority">'+esc(p.seniority_level)+'</span>');
if(p.source)tags.push('<span class="tag source">'+esc(p.source)+'</span>');
if(p.company_is_client)tags.push('<span class="tag client">CLIENT CO</span>');
(Array.isArray(p.industries)?p.industries:[]).slice(0,3).forEach(i=>tags.push('<span class="tag industry">'+esc(i)+'</span>'));
(Array.isArray(p.expertise_tags)?p.expertise_tags:[]).slice(0,4).forEach(t=>tags.push('<span class="tag">'+esc(t)+'</span>'));

const ct=[];
if(p.email)ct.push('<div class="ci">✉️ <a href="mailto:'+esc(p.email)+'">'+esc(p.email)+'</a></div>');
if(p.linkedin_url)ct.push('<div class="ci">🔗 <a href="'+esc(p.linkedin_url)+'" target="_blank">LinkedIn</a></div>');
if(p.phone)ct.push('<div class="ci">📞 '+esc(p.phone)+'</div>');

const coId=p.company_id_linked||p.current_company_id||'';
let h='<div class="profile">';
h+='<div class="avatar'+(notes.length?' noted':'')+'">'+ini+'</div>';
h+='<div class="pinfo">';
h+='<div class="pname">'+esc(p.full_name)+'</div>';
h+='<div class="ptitle">'+esc(p.current_title||p.headline||'')+'</div>';
h+='<div class="pmeta">';
if(p.current_company_name)h+='<span>🏢 <a href="/company.html?id='+coId+'">'+esc(p.current_company_name)+'</a>'+(p.company_sector?' · '+esc(p.company_sector):'')+'</span>';
if(p.location)h+='<span>📍 '+esc(p.location)+'</span>';
if(p.functional_area)h+='<span>⚡ '+esc(p.functional_area)+'</span>';
h+='</div>';
if(tags.length)h+='<div class="ptags">'+tags.join('')+'</div>';
h+='</div>';
h+='<div class="pcontact">'+ct.join('')+'</div>';
h+='<button class="enrich-btn" id="enrichBtn" onclick="enrichPerson()">🔄 Refresh &amp; Enrich</button>';
h+='</div>';

h+='<div class="grid"><div class="main">';

// Research Notes
h+='<div class="sec"><div class="sec-rule"></div><div class="sec-head"><div class="sec-title">Research Notes</div><div class="sec-count">'+notes.length+' NOTES</div></div><div class="sec-sub">Internal MitchelLake intelligence</div>';
if(!notes.length)h+='<div class="empty">No research notes yet</div>';
else notes.forEach(n=>{
  const qb=n.note_quality?'<span class="note-q '+(n.note_quality==='high'?'high':'medium')+'">'+n.note_quality+'</span>':'';
  let intel='';
  if(n.extracted_intelligence&&typeof n.extracted_intelligence==='object'){
    const e=Object.entries(n.extracted_intelligence).filter(([k,v])=>v&&String(v).length).map(([k,v])=>'<strong>'+esc(k.replace(/_/g,' '))+':</strong> '+esc(typeof v==='object'?JSON.stringify(v):String(v)));
    if(e.length)intel='<div class="note-intel"><b>Extracted Intelligence</b>'+e.join(' · ')+'</div>';
  }
  h+='<div class="note"><div class="note-top"><div class="note-subj">'+esc(n.subject||'Research Note')+qb+'</div><div class="note-date">'+fmtD(n.interaction_at||n.created_at)+'</div></div><div class="note-body">'+esc(n.summary||'')+'</div>'+intel+'</div>';
});
h+='</div>';

// Company Signals
if(csig.length){
  h+='<div class="sec"><div class="sec-rule thin"></div><div class="sec-head"><div class="sec-title">Company Signals</div><div class="sec-count">'+csig.length+'</div></div><div class="sec-sub">Signals about '+esc(p.current_company_name||'employer')+'</div>';
  csig.forEach(x=>{
    h+='<div class="sig"><div class="sig-icon">'+(SI[x.signal_type]||'📡')+'</div><div class="sig-info"><div class="sig-hl">'+esc(x.evidence_summary||x.signal_type.replace(/_/g,' '))+'</div><div class="sig-det">'+esc(x.signal_type.replace(/_/g,' '))+' · '+ago(x.detected_at)+' · '+(x.triage_status||'new')+'</div></div><div class="sig-conf">'+Math.round((x.confidence_score||0)*100)+'%</div></div>';
  });
  h+='</div>';
}

// Interactions
if(ixs.length){
  h+='<div class="sec"><div class="sec-rule thin"></div><div class="sec-head"><div class="sec-title">Interactions</div><div class="sec-count">'+ixs.length+'</div></div><div class="sec-sub">Emails, calls, meetings</div>';
  ixs.forEach(i=>{
    h+='<div class="ix"><div class="ix-icon">'+(II[i.interaction_type]||'📋')+'</div><div class="ix-info"><div class="ix-title">'+esc(i.subject||i.summary||i.interaction_type)+'</div>'+(i.email_snippet?'<div class="ix-det">'+esc(String(i.email_snippet).slice(0,200))+'</div>':'')+'<div class="ix-det">'+esc(i.interaction_type)+(i.direction?' · '+i.direction:'')+'</div></div><div class="ix-date">'+fmtD(i.interaction_at)+'</div></div>';
  });
  h+='</div>';
}

h+='</div>'; // end main

// SIDEBAR
h+='<div class="side">';
h+='<div class="ss"><div class="ss-rule"></div><div class="ss-title">Activity</div><div class="stats"><div class="st"><div class="st-v">'+(s.notes||0)+'</div><div class="st-l">Notes</div></div><div class="st"><div class="st-v">'+(s.emails||0)+'</div><div class="st-l">Emails</div></div><div class="st"><div class="st-v">'+(s.calls||0)+'</div><div class="st-l">Calls</div></div><div class="st"><div class="st-v">'+(s.meetings||0)+'</div><div class="st-l">Meetings</div></div></div>';
if(s.last_interaction)h+='<div style="font-size:11px;color:var(--ink-4);margin-top:6px">Last: '+fmtD(s.last_interaction)+'</div>';
if(s.first_interaction)h+='<div style="font-size:11px;color:var(--ink-4)">First: '+fmtD(s.first_interaction)+'</div>';
h+='</div>';

if(p.bio){
  h+='<div class="ss"><div class="ss-rule"></div><div class="ss-title">Bio</div><div style="font-size:13px;color:var(--ink-2);line-height:1.6;overflow-wrap:break-word">'+esc(p.bio)+'</div></div>';
}

if(colls.length){
  h+='<div class="ss"><div class="ss-rule"></div><div class="ss-title">At '+esc(p.current_company_name||'Company')+'</div>';
  colls.slice(0,12).forEach(c=>{
    const ci=(c.full_name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    h+='<div class="coll" onclick="location.href=\'/person.html?id='+c.id+'\'"><div class="coll-av">'+ci+'</div><div class="coll-info"><div class="coll-name">'+esc(c.full_name)+'</div><div class="coll-title">'+esc(c.current_title||'')+'</div></div></div>';
  });
  if(colls.length>12)h+='<div style="font-size:11px;color:var(--ink-4);padding:6px 0">+'+String(colls.length-12)+' more</div>';
  h+='</div>';
}

if(psig.length){
  h+='<div class="ss"><div class="ss-rule"></div><div class="ss-title">Career Signals</div>';
  psig.slice(0,8).forEach(x=>{
    h+='<div style="padding:6px 0;border-bottom:1px solid var(--rule);font-size:13px"><div style="font-weight:500">'+esc(x.title||x.signal_type.replace(/_/g,' '))+'</div>'+(x.description?'<div style="color:var(--ink-3);font-size:12px;margin-top:1px;overflow-wrap:break-word">'+esc(String(x.description).slice(0,120))+'</div>':'')+'</div>';
  });
  h+='</div>';
}

h+='</div></div>'; // end side + grid
document.getElementById('app').innerHTML=h;
})();

async function enrichPerson() {
  const btn = document.getElementById('enrichBtn');
  if (!btn) return;
  btn.className = 'enrich-btn loading';
  btn.textContent = '⏳ Enriching…';
  try {
    const id = new URLSearchParams(location.search).get('id');
    const r = await fetch('/api/people/' + id + '/enrich', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + localStorage.getItem('ml_token') },
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    btn.className = 'enrich-btn done';
    const msgs = [];
    if (data.results.ezekia?.updated_fields) msgs.push('Ezekia: ' + data.results.ezekia.updated_fields.join(', '));
    if (data.results.gmail?.messages_found) msgs.push('Gmail: ' + data.results.gmail.messages_found + ' emails');
    if (data.results.embedding?.message) msgs.push('Embedding updated');
    btn.textContent = '✅ ' + (msgs.length ? msgs.join(' · ') : 'Up to date');
    setTimeout(() => location.reload(), 2000);
  } catch (e) {
    btn.className = 'enrich-btn';
    btn.textContent = '❌ ' + e.message;
    setTimeout(() => { btn.textContent = '🔄 Refresh & Enrich'; }, 3000);
  }
}
</script>
<script src="/chat.js"></script>
</body>
</html>
