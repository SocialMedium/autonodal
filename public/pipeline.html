<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pipeline — MitchelLake Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --serif:'Source Serif 4',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  --bg:#FAF9F7;--surface:#FFFFFF;--surface-warm:#F7F5F2;--surface-cool:#F2F4F8;
  --ink:#1A1A1A;--ink-2:#4A4A4A;--ink-3:#7A7A7A;--ink-4:#AAAAAA;
  --rule:#E0DDD8;--rule-bold:#C8C4BE;
  --blue:#2563EB;--blue-soft:#EBF1FE;--emerald:#0D7A50;--emerald-soft:#E8F5EE;
  --amber:#B45309;--amber-soft:#FEF7E8;--rose:#C41D3E;--rose-soft:#FDF0F2;
  --violet:#6D28D9;--violet-soft:#F3EEFE;--radius:8px;
  --shadow-card:0 1px 3px rgba(0,0,0,0.04);--shadow-hover:0 4px 16px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:auto}
.masthead{background:var(--surface);border-bottom:2px solid var(--ink);padding:0 clamp(14px,3vw,40px);position:sticky;top:0;z-index:100}
.masthead-top{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:1400px;margin:0 auto}
.masthead-logo{font-family:var(--serif);font-size:20px;font-weight:600;text-decoration:none;color:inherit}
.masthead-logo em{font-style:italic;color:var(--ink-3)}
.masthead-nav{display:flex;gap:2px}
.masthead-nav a{font-size:12px;font-weight:500;color:var(--ink-3);text-decoration:none;padding:6px 14px;border-radius:6px;transition:all .15s}
.masthead-nav a:hover{color:var(--ink);background:var(--surface-warm)}
.masthead-nav a.active{color:var(--ink);background:var(--surface-warm);font-weight:600}
.masthead-user{width:32px;height:32px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer}

.page{max-width:1400px;margin:0 auto;padding:24px clamp(14px,3vw,40px) 60px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-family:var(--serif);font-size:24px;font-weight:600}
.summary{display:flex;gap:16px;font-size:12px;color:var(--ink-3);align-items:center}
.summary-val{font-family:var(--mono);font-weight:600;color:var(--ink)}

.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:20px;min-height:calc(100vh - 180px)}
.column{min-width:250px;max-width:300px;flex:1;display:flex;flex-direction:column}
.col-header{padding:10px 12px;border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--rule);border-bottom:3px solid;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.col-label{display:flex;flex-direction:column}
.col-label h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3)}
.col-total{font-family:var(--mono);font-size:11px;color:var(--ink-4);margin-top:1px}
.col-count{font-family:var(--mono);font-size:10px;color:var(--ink-4);background:var(--surface-warm);padding:2px 7px;border-radius:10px}
.col-body{flex:1;background:var(--surface-warm);border:1px solid var(--rule);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:8px;display:flex;flex-direction:column;gap:8px;min-height:100px}

.card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);padding:10px 12px;cursor:grab;transition:box-shadow .15s,border-color .15s;font-size:12px}
.card:hover{box-shadow:var(--shadow-hover);border-color:var(--rule-bold)}
.card.sortable-chosen{box-shadow:var(--shadow-hover);opacity:.9}
.card-company{font-weight:600;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-signal{font-size:10px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.card-signal .dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.pill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block}
.card-value{display:flex;align-items:center;gap:4px;margin-top:6px;padding-top:6px;border-top:1px solid var(--rule)}
.card-value input{font-family:var(--mono);font-size:12px;font-weight:600;border:1px solid transparent;border-radius:4px;padding:2px 6px;width:100px;background:transparent;color:var(--ink);transition:border-color .15s}
.card-value input:hover{border-color:var(--rule)}
.card-value input:focus{outline:none;border-color:var(--blue);background:var(--blue-soft)}
.card-owner{font-size:10px;color:var(--ink-4);margin-top:4px}
.card-date{font-size:9px;color:var(--ink-4)}
.card-summary{font-size:10px;color:var(--ink-3);margin:4px 0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.col-new .col-header{border-bottom-color:var(--ink-4)}
.col-claimed .col-header{border-bottom-color:var(--blue)}
.col-actioned .col-header{border-bottom-color:var(--amber)}
.col-converted .col-header{border-bottom-color:var(--violet)}
.col-won .col-header{border-bottom-color:var(--emerald)}

.empty-col{font-size:11px;color:var(--ink-4);text-align:center;padding:24px 8px}
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-top">
    <a href="/index.html" class="masthead-logo">MitchelLake <em>Signals</em></a>
    <nav class="masthead-nav">
      <a href="/index.html">Signals</a>
      <a href="/people.html">People</a>
      <a href="/companies.html">Companies</a>
      <a href="/dispatches.html">Dispatch</a>
      <a href="/pipeline.html" class="active">Pipeline</a>
      <a href="/delivery.html">Delivery</a>
      <a href="/placements.html">Revenue</a>
    </nav>
    <div class="masthead-user" id="userAvatar">?</div>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Sales Pipeline</div>
      <div style="font-size:12px;color:var(--ink-3);margin-top:2px">Signal-to-revenue pipeline. Drag cards between stages. Click value to edit.</div>
    </div>
    <div class="summary" id="summary">Loading...</div>
  </div>
  <div class="board" id="board">
    <div style="padding:40px;color:var(--ink-3)">Loading pipeline...</div>
  </div>
</div>

<script>
var SIG_COLORS={capital_raising:'#EF9F27',strategic_hiring:'#5DCAA5',geographic_expansion:'#378ADD',leadership_change:'#D4537E',ma_activity:'#AFA9EC',product_launch:'#97C459',layoffs:'#E24B4A',restructuring:'#E24B4A',partnership:'#85B7EB'};
var COLUMNS=[
  {key:'new',label:'New Signals',cls:'col-new'},
  {key:'claimed',label:'Claimed',cls:'col-claimed'},
  {key:'actioned',label:'Actioned',cls:'col-actioned'},
  {key:'converted',label:'Converted',cls:'col-converted'},
  {key:'won',label:'Won',cls:'col-won'},
];

function getToken(){return localStorage.getItem('ml_token')}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(d){if(!d)return'';var ms=Date.now()-new Date(d).getTime();if(ms<86400000)return'today';if(ms<604800000)return Math.floor(ms/86400000)+'d ago';return new Date(d).toLocaleDateString()}
function fmtCurrency(n){return'$'+(parseInt(n)||0).toLocaleString()}

async function api(url,opts){
  opts=opts||{};var token=getToken();
  var r=await fetch(url,Object.assign({},opts,{headers:Object.assign({'Content-Type':'application/json'},token?{'Authorization':'Bearer '+token}:{},opts.headers||{}),body:opts.body?JSON.stringify(opts.body):undefined}));
  if(r.status===401){localStorage.removeItem('ml_token');window.location='/index.html';throw new Error('Unauthorized')}
  if(!r.ok){var e=await r.json().catch(function(){return{error:r.statusText}});throw new Error(e.error||'Failed')}
  return r.json();
}

async function updateValue(id,input){
  var raw=input.value.replace(/[^0-9.]/g,'');
  var val=parseFloat(raw)||0;
  input.value=fmtCurrency(val);
  try{await api('/api/pipeline/'+id+'/value',{method:'PATCH',body:{pipeline_value:val}})}catch(e){console.error(e)}
  updateTotals();
}

function updateTotals(){
  document.querySelectorAll('.col-body').forEach(function(col){
    var total=0;
    col.querySelectorAll('.card').forEach(function(c){
      var v=c.querySelector('.val-input');
      if(v)total+=parseFloat(v.value.replace(/[^0-9.]/g,''))||0;
    });
    var header=col.previousElementSibling;
    header.querySelector('.col-count').textContent=col.querySelectorAll('.card').length;
    var totalEl=header.querySelector('.col-total');
    if(totalEl)totalEl.textContent=total>0?fmtCurrency(total):'';
  });
  // Grand total
  var grand=0;
  document.querySelectorAll('.val-input').forEach(function(v){grand+=parseFloat(v.value.replace(/[^0-9.]/g,''))||0});
  var sumEl=document.getElementById('summary');
  var cnt=document.querySelectorAll('.card').length;
  sumEl.innerHTML='<span>'+cnt+' signals</span><span class="summary-val">'+fmtCurrency(grand)+' pipeline</span>';
}

async function archiveCard(id){
  try{
    await api('/api/pipeline/'+id+'/stage',{method:'PATCH',body:{stage:'archived'}});
    document.querySelector('.card[data-id="'+id+'"]')?.remove();
    updateTotals();
  }catch(e){alert('Failed: '+e.message)}
}

async function deleteCard(id,name){
  if(!confirm('Delete "'+name+'" from pipeline? This cannot be undone.'))return;
  try{
    await api('/api/pipeline/'+id,{method:'DELETE'});
    document.querySelector('.card[data-id="'+id+'"]')?.remove();
    updateTotals();
  }catch(e){alert('Failed: '+e.message)}
}

async function loadBoard(){
  try{
    var data=await api('/api/pipeline/board');
    var cols=data.columns;

    var html='';
    COLUMNS.forEach(function(col){
      var items=cols[col.key]||[];
      var total=items.reduce(function(s,d){return s+(parseFloat(d.pipeline_value)||0)},0);

      html+='<div class="column '+col.cls+'">';
      html+='<div class="col-header"><div class="col-label"><h3>'+col.label+'</h3><div class="col-total">'+(total>0?fmtCurrency(total):'')+'</div></div><span class="col-count">'+items.length+'</span></div>';
      html+='<div class="col-body" data-stage="'+col.key+'">';
      if(!items.length)html+='<div class="empty-col">No signals</div>';
      items.forEach(function(d){
        var sc=SIG_COLORS[d.signal_type]||'#888';
        var val=parseFloat(d.pipeline_value)||0;
        var isClient=d.is_client;
        var contacts=parseInt(d.contact_count)||0;
        var proxCount=parseInt(d.prox_count)||0;
        var leadScore=parseFloat(d.lead_score)||0;
        html+='<div class="card" data-id="'+d.id+'" data-stage="'+(d.pipeline_stage||'new')+'" onclick="window.location=\'/company.html?id='+d.company_id+'\'" style="cursor:pointer'+(isClient?';border-left:3px solid var(--amber)':'')+ '">';
        html+='<div class="card-company">'+esc(d.company_name)+(isClient?' <span style="font-size:8px;font-weight:700;color:var(--amber);vertical-align:middle">CLIENT</span>':'')+'</div>';
        html+='<div class="card-signal"><span class="dot" style="background:'+sc+'"></span>'+esc((d.signal_type||'').replace(/_/g,' '))+'<span style="font-size:9px;color:var(--ink-4);margin-left:auto">'+Math.round((d.confidence_score||0)*100)+'%</span></div>';
        // Network context
        var ctx=[];
        if(proxCount>0)ctx.push('<span class="pill" style="background:var(--blue-soft);color:var(--blue)">'+proxCount+' connected</span>');
        else if(contacts>0)ctx.push('<span class="pill" style="background:var(--surface-cool);color:var(--ink-3)">'+contacts+' contacts</span>');
        if(ctx.length)html+='<div style="display:flex;gap:4px;margin-bottom:4px">'+ctx.join('')+'</div>';
        if(d.opportunity_angle)html+='<div class="card-summary">'+esc(d.opportunity_angle)+'</div>';
        html+='<div class="card-meta">';
        if(d.sector)html+='<span class="pill" style="background:var(--surface-cool);color:var(--ink-3)">'+esc(d.sector)+'</span>';
        if(d.geography)html+='<span class="pill" style="background:var(--surface-cool);color:var(--ink-3)">'+esc(d.geography)+'</span>';
        if(parseInt(d.related_signals)>1)html+='<span class="pill" style="background:var(--amber-soft);color:var(--amber)">'+d.related_signals+' signals</span>';
        html+='</div>';
        html+='<div class="card-value" onclick="event.stopPropagation()"><span style="font-size:10px;color:var(--ink-4)">Value:</span><input class="val-input" type="text" value="'+fmtCurrency(val)+'" onfocus="this.select()" onblur="updateValue(\''+d.id+'\',this)" onkeydown="if(event.key===\'Enter\'){this.blur()}"></div>';
        if(d.owner_name)html+='<div class="card-owner">'+esc(d.owner_name)+'</div>';
        var dateLabel=d.won_at?'Won '+ago(d.won_at):d.converted_at?'Converted '+ago(d.converted_at):d.actioned_at?'Actioned '+ago(d.actioned_at):d.claimed_at?'Claimed '+ago(d.claimed_at):'Created '+ago(d.created_at);
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><div class="card-date">'+dateLabel+'</div>';
        html+='<div style="display:flex;gap:4px" onclick="event.stopPropagation()">';
        html+='<button onclick="archiveCard(\''+d.id+'\')" title="Archive" style="font-size:9px;padding:2px 6px;border:1px solid var(--rule);border-radius:4px;background:var(--surface-warm);color:var(--ink-4);cursor:pointer;font-family:var(--sans)">Archive</button>';
        html+='<button onclick="deleteCard(\''+d.id+'\',\''+esc(d.company_name).replace(/'/g,"\\'")+'\')" title="Delete" style="font-size:9px;padding:2px 6px;border:1px solid var(--rule);border-radius:4px;background:var(--rose-soft);color:var(--rose);cursor:pointer;font-family:var(--sans)">Delete</button>';
        html+='</div></div>';
        html+='</div>';
      });
      html+='</div></div>';
    });

    document.getElementById('board').innerHTML=html;
    updateTotals();

    // SortableJS
    document.querySelectorAll('.col-body').forEach(function(el){
      new Sortable(el,{
        group:'pipeline',
        animation:150,
        ghostClass:'sortable-ghost',
        chosenClass:'sortable-chosen',
        onEnd:function(evt){
          var cardEl=evt.item;
          var newStage=evt.to.dataset.stage;
          var oldStage=cardEl.dataset.stage;
          if(newStage===oldStage)return;
          var id=cardEl.dataset.id;
          cardEl.dataset.stage=newStage;
          // Remove empty-col placeholder if present
          var empty=evt.to.querySelector('.empty-col');
          if(empty)empty.remove();
          api('/api/pipeline/'+id+'/stage',{method:'PATCH',body:{stage:newStage}}).catch(function(e){
            alert('Failed: '+e.message);
            loadBoard();
          });
          updateTotals();
        }
      });
    });
  }catch(e){
    document.getElementById('board').innerHTML='<div style="padding:40px;color:var(--rose)">Failed: '+esc(e.message)+'</div>';
  }
}

(function(){
  if(!getToken()){window.location='/index.html';return}
  try{var u=JSON.parse(localStorage.getItem('ml_user')||'{}');document.getElementById('userAvatar').textContent=(u.name||'').split(' ').map(function(w){return w[0]}).join('').slice(0,2)||'?'}catch(e){}
  loadBoard();
})();
</script>
<script src="/terminology.js"></script>
</body>
</html>
