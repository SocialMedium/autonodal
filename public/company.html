<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company — Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Source Serif 4', 'Georgia', serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --bg: #FAF9F7; --surface: #FFFFFF; --surface-warm: #F7F5F2; --surface-cool: #F2F4F8;
  --ink: #1A1A1A; --ink-2: #4A4A4A; --ink-3: #7A7A7A; --ink-4: #AAAAAA;
  --rule: #E0DDD8; --rule-bold: #C8C4BE;
  --blue: #2563EB; --blue-soft: #EBF1FE;
  --emerald: #0D7A50; --emerald-soft: #E8F5EE;
  --amber: #B45309; --amber-soft: #FEF7E8;
  --rose: #C41D3E; --rose-soft: #FDF0F2;
  --violet: #6D28D9; --violet-soft: #F3EEFE;
  --radius: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }

/* Masthead */
.masthead { background: var(--surface); border-bottom: 2px solid var(--ink); padding: 0 clamp(14px, 3vw, 40px); position: sticky; top: 0; z-index: 100; }
.masthead-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; max-width: 1320px; margin: 0 auto; }
.mast-logo { font-family: var(--serif); font-size: 22px; font-weight: 600; text-decoration: none; color: var(--ink); }
.mast-logo em { font-style: italic; color: var(--ink-3); }
.mast-nav { display: flex; gap: 2px; }
.mast-nav a { font-size: 13px; font-weight: 500; color: var(--ink-3); text-decoration: none; padding: 6px 14px; border-radius: 6px; }
.mast-nav a:hover { color: var(--ink); background: var(--surface-warm); }
.mast-nav a.active { color: var(--ink); background: var(--surface-warm); font-weight: 600; }

.page { max-width: 1320px; margin: 0 auto; padding: 32px clamp(14px, 3vw, 40px) 60px; overflow: hidden; }
.back { font-size: 13px; color: var(--ink-3); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; }
.back:hover { color: var(--ink); }

/* Company header */
.co-hdr { padding-bottom: 24px; margin-bottom: 32px; border-bottom: 2px solid var(--ink); }
.co-top { display: flex; gap: 20px; align-items: flex-start; }
.co-av { width: 64px; height: 64px; border-radius: 12px; background: var(--surface-cool); border: 2px solid var(--rule); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 26px; font-weight: 700; color: var(--ink-3); flex-shrink: 0; }
.co-av.client { border-color: var(--amber); background: var(--amber-soft); color: var(--amber); }
.co-info { flex: 1; min-width: 0; }
.co-name { font-family: var(--serif); font-size: clamp(22px, 4vw, 30px); font-weight: 600; line-height: 1.2; overflow-wrap: break-word; }
.co-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; font-size: 14px; color: var(--ink-2); }
.co-meta a { color: var(--blue); text-decoration: none; font-weight: 500; }
.co-meta a:hover { text-decoration: underline; }
.co-tags { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px; background: var(--surface-warm); color: var(--ink-3); white-space: nowrap; }
.tag.client { background: var(--amber-soft); color: var(--amber); }
.tag.sector { background: var(--blue-soft); color: var(--blue); }
.tag.geo { background: var(--emerald-soft); color: var(--emerald); }
.tag.size { background: var(--violet-soft); color: var(--violet); }
.co-desc { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin-top: 12px; overflow-wrap: break-word; max-width: 720px; }
.co-stats { display: flex; gap: 0; margin-top: 18px; border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; max-width: 480px; }
.co-st { flex: 1; padding: 14px; text-align: center; border-right: 1px solid var(--rule); }
.co-st:last-child { border-right: none; }
.co-st-v { font-family: var(--serif); font-size: 22px; font-weight: 600; }
.co-st-l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-4); font-weight: 600; }
.enrich-btn { background: var(--surface-warm); border: 1px solid var(--rule); border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink-2); font-family: var(--sans); white-space: nowrap; transition: all 0.15s; margin-top: 12px; }
.enrich-btn:hover { background: #EBF1FE; border-color: #2563EB; color: #2563EB; }
.enrich-btn.loading { opacity: 0.6; pointer-events: none; }
.enrich-btn.done { background: #E6F5EC; border-color: #0D7A50; color: #0D7A50; }

/* Card-based grid */
.grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
.card { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-card); overflow: hidden; min-width: 0; }
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media(max-width:960px){ .card-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:600px){ .card-grid { grid-template-columns: 1fr; } }
.card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.card-title { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.card-count { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
.card-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 12px; }

.sec { margin-bottom: 0; }
.sec-rule { height: 3px; background: var(--ink); margin-bottom: 8px; }
.sec-rule.thin { height: 1px; background: var(--rule); margin-bottom: 8px; }
.sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.sec-title { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.sec-count { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
.sec-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 12px; }

/* Signal cards */
.sigcard { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 10px; box-shadow: var(--shadow-card); overflow: hidden; }
.sigcard:hover { box-shadow: var(--shadow-hover); }
.sigcard-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.sigcard-hl { font-size: 14px; font-weight: 500; line-height: 1.35; flex: 1; min-width: 0; overflow-wrap: break-word; }
.sigcard-conf { font-family: var(--mono); font-size: 12px; flex-shrink: 0; padding: 2px 7px; border-radius: 3px; }
.sigcard-conf.hi { background: var(--emerald-soft); color: var(--emerald); }
.sigcard-conf.md { background: var(--amber-soft); color: var(--amber); }
.sigcard-conf.lo { background: var(--rose-soft); color: var(--rose); }
.sigcard-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.sbadge { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 600; background: var(--surface-warm); color: var(--ink-3); }
.sigcard-ev { font-size: 12px; color: var(--ink-2); margin-top: 6px; line-height: 1.45; border-left: 2px solid var(--rule); padding-left: 10px; overflow-wrap: break-word; }
.sigcard-src { font-size: 11px; color: var(--ink-4); margin-top: 6px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sigcard-src a { color: var(--blue); text-decoration: none; font-weight: 500; }
.sigcard-src a:hover { text-decoration: underline; }
.sigcard-hire { margin-top: 8px; padding: 8px 12px; background: var(--blue-soft); border-radius: 6px; border-left: 3px solid var(--blue); font-size: 12px; color: var(--ink-2); line-height: 1.45; overflow-wrap: break-word; }
.sigcard-hire b { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--blue); display: block; margin-bottom: 2px; }

/* Person rows */
.prow { display: grid; grid-template-columns: 1fr 140px 80px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rule); cursor: pointer; }
.prow:hover { background: var(--surface-warm); margin: 0 -8px; padding: 10px 8px; border-radius: 4px; }
.pid { display: flex; gap: 10px; align-items: center; min-width: 0; }
.pav { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-cool); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--ink-3); flex-shrink: 0; }
.pav.noted { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.pn { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt { font-size: 12px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pmeta2 { font-size: 12px; color: var(--ink-3); white-space: nowrap; }
.pnb { font-size: 11px; font-weight: 600; color: var(--blue); }

/* Placement rows */
.plrow { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rule); gap: 10px; }
.plinfo { flex: 1; min-width: 0; }
.plrole { font-size: 14px; font-weight: 500; overflow-wrap: break-word; }
.pldet { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
.plfee { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--emerald); flex-shrink: 0; }

/* Doc rows */
.drow { padding: 8px 0; border-bottom: 1px solid var(--rule); }
.drow a { font-size: 13px; color: var(--blue); text-decoration: none; font-weight: 500; line-height: 1.35; overflow-wrap: break-word; }
.drow a:hover { text-decoration: underline; }
.drow .dm { font-size: 11px; color: var(--ink-4); margin-top: 2px; }

/* Side */
.ss { margin-bottom: 24px; }
.ss-rule { height: 3px; background: var(--ink); margin-bottom: 8px; }
.ss-title { font-family: var(--serif); font-size: 16px; font-weight: 600; margin-bottom: 10px; }

.empty { text-align: center; padding: 20px; color: var(--ink-4); font-size: 13px; }
.loading { text-align: center; padding: 60px; color: var(--ink-3); }

@media (max-width: 1024px) {
  .card-grid { grid-template-columns: 1fr; }
  .side { padding-left: 0; margin-top: 32px; padding-top: 24px; border-top: 2px solid var(--ink); }
  .co-stats { max-width: 100%; }
}
@media (max-width: 768px) {
  .co-top { flex-direction: column; gap: 14px; }
  .mast-nav { display: none; }
  .prow { grid-template-columns: 1fr 60px; }
  .pmeta2 { display: none; }
}
@media (max-width: 480px) {
  .co-av { width: 48px; height: 48px; font-size: 20px; }
  .co-stats { flex-wrap: wrap; }
  .co-st { min-width: 50%; }
}
</style>
</head>
<body>
<header class="masthead"><div class="masthead-inner">
  <a href="/index.html" class="mast-logo"id="mastheadLogo">Signals</a>
  <nav class="mast-nav"><a href="/index.html">Signals</a><a href="/people.html">People</a><a href="/companies.html" class="active">Companies</a><a href="/dispatches.html">Dispatch</a><a href="/placements.html">Revenue</a><a href="/case-studies.html">Case Studies</a><a href="/huddles.html">Huddles</a></nav>
  <div id="userAvatar" style="width:34px;height:34px;border-radius:50%;background:var(--ink);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">?</div>
</div></header>
<script>try{var _u=JSON.parse(localStorage.getItem('ml_user')||'{}');var _i=(_u.name||_u.email||'?').split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2);var _el=document.getElementById('userAvatar');if(_el)_el.textContent=_i;}catch(e){}</script>

<div class="page">
  <a href="/companies.html" class="back">← Companies</a>
  <div id="app"><div class="loading">Loading company dossier…</div></div>
</div>

<script src="/icons.js"></script>
<script>
const TK=localStorage.getItem('ml_token');if(!TK)location.href='/index.html';
async function api(u){const r=await fetch(u,{headers:{Authorization:'Bearer '+TK}});if(r.status===401){location.href='/index.html';return null}if(!r.ok)throw new Error(r.statusText);return r.json()}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function fmtD(t){return t?new Date(t).toLocaleDateString('en-AU',{year:'numeric',month:'short',day:'numeric'}):'—'}
function ago(t){if(!t)return'';const m=Math.floor((Date.now()-new Date(t))/6e4);if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';const d=Math.floor(h/24);return d<30?d+'d':fmtD(t)}
function money(v){if(!v)return'—';const n=parseFloat(v);return isNaN(n)?'—':'$'+n.toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:0})}
function num(v){return v!=null?String(v):'0'}

const SI={capital_raising:'💰',ma_activity:'🔗',product_launch:'🚀',partnership:'🤝',geographic_expansion:'🌐',restructuring:'⚙️',leadership_change:'👤',layoffs:'📉',strategic_hiring:'👥'};
const SIC={capital_raising:'#EF9F27',ma_activity:'#AFA9EC',product_launch:'#97C459',partnership:'#85B7EB',geographic_expansion:'#378ADD',restructuring:'#E24B4A',leadership_change:'#D4537E',layoffs:'#E24B4A',strategic_hiring:'#5DCAA5'};
if(typeof signalIcon==='function'){Object.keys(SI).forEach(k=>{SI[k]='<span style="display:inline-flex;color:'+(SIC[k]||'#888')+'">'+signalIcon(k,18)+'</span>'})}
const id=new URLSearchParams(location.search).get('id');if(!id)location.href='/companies.html';

(async()=>{
const c=await api('/api/companies/'+id);if(!c)return;
document.title=(c.name||'Company')+' — Signals';

const initial=(c.name||'?')[0].toUpperCase();
const sigs=c.signals||[];const ppl=c.people||[];const pls=c.placements||[];const docs=c.documents||[];const opps=c.opportunities||[];const pipelineTotal=c.pipeline_total||0;const csLib=c.case_studies||[];
const totalFees=pls.reduce((s,p)=>s+(parseFloat(p.placement_fee)||0),0);

const tags=[];
if(c.is_client)tags.push('<span class="tag client">CLIENT</span>');
if(c.sector)tags.push('<span class="tag sector">'+esc(c.sector)+'</span>');
if(c.sub_sector)tags.push('<span class="tag sector">'+esc(c.sub_sector)+'</span>');
if(c.geography)tags.push('<span class="tag geo">'+esc(c.geography)+'</span>');
if(c.employee_count_band)tags.push('<span class="tag size">'+esc(c.employee_count_band)+'</span>');

let h='<div class="co-hdr"><div class="co-top">';
h+='<div class="co-av'+(c.is_client?' client':'')+'">'+initial+'</div>';
h+='<div class="co-info">';
h+='<div class="co-name">'+esc(c.name)+'</div>';
h+='<div class="co-meta">';
if(c.sector)h+='<span>'+esc(c.sector)+'</span>';
if(c.geography)h+='<span>'+icon('map-pin')+' '+esc(c.geography)+'</span>';
if(c.domain)h+='<span>'+icon('globe')+' <a href="https://'+esc(c.domain)+'" target="_blank">'+esc(c.domain)+'</a></span>';
if(c.linkedin_url)h+='<span>'+icon('link')+' <a href="'+esc(c.linkedin_url)+'" target="_blank">LinkedIn</a></span>';
h+='<span>'+icon('external-link')+' <a href="https://ezekia.com/#/search?type=company&query='+encodeURIComponent(c.name)+'" target="_blank">Ezekia</a></span>';
h+='</div>';
if(tags.length)h+='<div class="co-tags">'+tags.join('')+'</div>';
if(c.description)h+='<div class="co-desc">'+esc(c.description)+'</div>';
h+='</div></div>';
var is=c.interaction_summary;
h+='<div class="co-stats"><div class="co-st"><div class="co-st-v">'+ppl.length+'</div><div class="co-st-l">Contacts</div></div><div class="co-st"><div class="co-st-v">'+opps.length+'</div><div class="co-st-l">Searches</div></div><div class="co-st"><div class="co-st-v">'+pls.length+'</div><div class="co-st-l">Placements</div></div><div class="co-st"><div class="co-st-v">'+pipelineTotal+'</div><div class="co-st-l">Pipeline</div></div><div class="co-st"><div class="co-st-v">'+sigs.length+'</div><div class="co-st-l">Signals</div></div><div class="co-st"><div class="co-st-v">'+docs.length+'</div><div class="co-st-l">Docs</div></div>';
if(is){h+='<div class="co-st"><div class="co-st-v">'+num(is.interactions_90d)+'</div><div class="co-st-l">Interactions (90d)</div></div><div class="co-st"><div class="co-st-v">'+num(is.contacts_engaged)+'</div><div class="co-st-l">Engaged</div></div>';}
h+='</div>';
h+='<button class="enrich-btn" id="enrichBtn" onclick="enrichCompany()">'+icon('refresh-cw')+' Refresh &amp; Enrich</button>';
h+='<button class="enrich-btn" id="searchEnrichBtn" onclick="searchEnrichCompany()">'+icon('search')+' News Search</button>';
h+='</div>';

h+='<div class="card-grid">';

// ── SIGNALS (cols 1-2) ──
var sigTypes = {};
sigs.forEach(function(s){ sigTypes[s.signal_type] = (sigTypes[s.signal_type]||0)+1; });
var sigSummary = Object.entries(sigTypes).map(function(e){ return e[1]+' '+e[0].replace(/_/g,' '); }).join(' · ');

h+='<div class="card" style="grid-column:span 2"><div class="card-head"><div class="card-title">Signals</div><div class="card-count">'+sigs.length+'</div></div>';
if(sigSummary)h+='<div style="font-size:11px;color:var(--ink-3);margin-bottom:8px">'+sigSummary+'</div>';
if(!sigs.length)h+='<div style="font-size:12px;color:var(--ink-4);padding:8px 0">No signals detected</div>';
else {
  h+=cappedList(sigs, 6, function(s){
    var icon=SI[s.signal_type]||''+icon('radio')+'';
    var conf=Math.round((s.confidence_score||0)*100);
    var cc=conf>=80?'hi':conf>=50?'md':'lo';
    var type=s.signal_type.replace(/_/g,' ');
    var linkUrl = s.source_url || 'https://www.google.com/search?q=' + encodeURIComponent((c.name || '') + ' ' + (s.evidence_summary || type).slice(0, 80));
    return '<div class="sigcard" id="signal-'+s.id+'" style="cursor:pointer" onclick="window.open(\''+esc(linkUrl).replace(/'/g,"\\'")+'\',\'_blank\')"'+
      '><div class="sigcard-top"><div class="sigcard-hl">'+icon+' '+esc((s.evidence_summary||s.doc_title||type).slice(0,120))+'</div><div class="sigcard-conf '+cc+'">'+conf+'%</div></div>'+
      '<div class="sigcard-badges"><span class="sbadge">'+type.toUpperCase()+'</span><span class="sbadge">'+ago(s.detected_at)+'</span>'+(s.geography?'<span class="sbadge">'+esc(s.geography)+'</span>':'')+'</div>'+
      '<div class="sigcard-src"><a href="'+esc(linkUrl)+'" target="_blank" onclick="event.stopPropagation()" style="font-size:10px;color:var(--blue);text-decoration:none">'+(s.source_url?'↗ Source':'↗ Search')+'</a></div>'+
    '</div>';
  });
}
h+='</div>'; // close signals card

// ── PROXIMITY MAP (col 3, spanning rows alongside signals + contacts) ──
var proxMap = c.proximity_map || [];
if (proxMap.length > 0) {
  var byMember = {};
  proxMap.forEach(function(p) {
    if (!byMember[p.team_member]) byMember[p.team_member] = [];
    byMember[p.team_member].push(p);
  });
  var memberCount = Object.keys(byMember).length;
  h+='<div class="card" style="grid-column:3;grid-row:1/span 3"><div class="card-head"><div class="card-title">' + icon('link') + ' Proximity Map</div><div class="card-count">' + memberCount + ' team · ' + proxMap.length + '</div></div>';
  h+='<div style="font-size:11px;color:var(--ink-3);margin-bottom:10px">Who on the team knows people here</div>';
  h+='<div style="font-size:12px">';
  Object.keys(byMember).forEach(function(member) {
    var connections = byMember[member];
    h+='<div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--rule)">';
    h+='<div style="font-weight:600;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;gap:6px">' + icon('user') + ' ' + esc(member) + ' <span style="font-size:10px;color:var(--ink-4);font-weight:400">' + connections.length + '</span></div>';
    connections.forEach(function(conn) {
      var strength = Math.round((parseFloat(conn.relationship_strength) || 0) * 100);
      var strengthColor = strength >= 50 ? 'var(--emerald)' : strength >= 25 ? 'var(--amber)' : 'var(--ink-4)';
      var strengthLabel = strength >= 50 ? 'Strong' : strength >= 25 ? 'Warm' : 'Cool';
      h+='<a href="/person.html?id=' + conn.person_id + '" style="display:flex;align-items:center;gap:8px;padding:5px 0;text-decoration:none;color:inherit">';
      h+='<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:var(--ink)">' + esc(conn.contact_name) + '</div>';
      if (conn.current_title) h+='<div style="font-size:10px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(conn.current_title) + '</div>';
      h+='</div>';
      h+='<div style="text-align:right;flex-shrink:0"><div style="font-family:var(--mono);font-size:11px;font-weight:600;color:' + strengthColor + '">' + strength + '%</div>';
      h+='<div style="font-size:8px;color:' + strengthColor + ';text-transform:uppercase;letter-spacing:.5px">' + strengthLabel + '</div></div>';
      h+='</a>';
    });
    h+='</div>';
  });
  h+='</div></div>';
} else {
  h+='<div class="card" style="grid-column:3;grid-row:1"><div class="card-head"><div class="card-title">' + icon('link') + ' Proximity Map</div></div>';
  h+='<div style="font-size:12px;color:var(--ink-4);padding:8px 0">No team connections mapped yet. Connect Gmail to build your proximity graph.</div>';
  h+='</div>';
}

// ── PEOPLE (employees/contacts at this company) ──
h+='<div class="card"><div class="card-head"><div class="card-title">Contacts</div><div class="card-count">'+ppl.length+' total · sorted by recency</div></div>';
if(!ppl.length)h+='<div style="font-size:12px;color:var(--ink-4);padding:8px 0">No contacts linked — hit Enrich to find them</div>';
else {
  var seniorPpl = ppl.filter(function(p){return p.seniority_level&&['c_suite','vp','director'].includes(p.seniority_level)}).length;
  var connectedPpl = ppl.filter(function(p){return parseInt(p.interaction_count)>0||p.proximity_strength>0}).length;
  h+='<div style="font-size:11px;color:var(--ink-3);margin-bottom:8px">'+connectedPpl+' with activity · '+seniorPpl+' senior</div>';
  h+=cappedList(ppl, 6, function(p){
    var pi=(p.full_name||'').split(' ').map(function(w){return w[0]}).join('').slice(0,2).toUpperCase();
    var ixc=parseInt(p.interaction_count)||0;
    var ix90=parseInt(p.interactions_90d)||0;
    var nc=parseInt(p.note_count)||0;
    var ps=parseFloat(p.proximity_strength)||0;
    var connBadges = '';
    if (p.connection_types) {
      var types = (p.connection_types||'').split(', ');
      types.forEach(function(t){
        if(t.includes('linkedin')) connBadges+='<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:#E8F4FD;color:#0A66C2;font-weight:600;margin-right:2px">LI</span>';
        else if(t.includes('email')||t.includes('gmail')) connBadges+='<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:var(--blue-soft);color:var(--blue);font-weight:600;margin-right:2px">Email</span>';
      });
    }
    var viaBadge = p.connected_via ? '<span style="font-size:8px;color:var(--ink-4)">via '+esc(p.connected_via)+'</span>' : '';
    var engBadge = ix90 > 0 ? '<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:var(--emerald-soft);color:var(--emerald);font-weight:600">'+ix90+' recent</span>' : ixc > 0 ? '<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:var(--surface-warm);color:var(--ink-3);font-weight:500">'+ixc+' total</span>' : '';
    var lastIx = p.last_interaction ? '<span style="font-size:8px;color:var(--ink-4)">'+ago(p.last_interaction)+'</span>' : '';
    return '<div class="prow" onclick="location.href=\'/person.html?id='+p.id+'&from=company&from_id='+c.id+'&from_name='+encodeURIComponent(c.name||'')+'\'"><div class="pid"><div class="pav'+(ix90>0?' noted':'')+'">'+pi+'</div><div style="min-width:0"><div class="pn">'+esc(p.full_name)+' '+connBadges+'</div><div class="pt">'+esc(p.current_title||p.email||'')+'</div></div></div><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end">'+engBadge+lastIx+viaBadge+(nc?'<span class="pnb">'+nc+' notes</span>':'')+'</div></div>';
  });
}
h+='</div>'; // close people card

// ── SIDEBAR CARDS (order: Searches, Documents, Placements/Revenue, Details) ──
var expandId = 0;
function cappedList(items, limit, renderFn) {
  var vis = items.slice(0, limit);
  var hid = items.slice(limit);
  var out = vis.map(renderFn).join('');
  if (hid.length) {
    var eid = 'expand_' + (++expandId);
    out += '<div id="' + eid + '" style="display:none">' + hid.map(renderFn).join('') + '</div>';
    out += '<button onclick="document.getElementById(\'' + eid + '\').style.display=\'block\';this.style.display=\'none\'" style="width:100%;padding:6px;margin-top:6px;font-size:11px;color:var(--blue);background:var(--surface-cool);border:1px solid var(--rule);border-radius:6px;cursor:pointer;font-family:var(--sans)">Show ' + hid.length + ' more</button>';
  }
  return out;
}

// Searches
if(opps.length){
  var activeOpps = opps.filter(function(o){return o.status==='interviewing'||o.status==='sourcing'||o.status==='offer'}).length;
  var placedOpps = opps.filter(function(o){return o.status==='placed'}).length;
  h+='<div class="card"><div class="card-head"><div class="card-title">Searches</div><div class="card-count">'+opps.length+'</div></div>';
  h+='<div style="font-size:11px;color:var(--ink-3);margin-bottom:8px">'+activeOpps+' active · '+placedOpps+' placed · '+pipelineTotal+' candidates in pipeline</div>';
  h+=cappedList(opps, 6, function(o){
    var sc = o.status==='placed'?'var(--emerald)':o.status==='interviewing'?'var(--blue)':o.status==='on_hold'?'var(--ink-4)':'var(--amber)';
    return '<div style="padding:5px 0;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center"><div style="min-width:0"><div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(o.title)+'</div><div style="font-size:10px;color:var(--ink-4)">'+parseInt(o.candidate_count||0)+' candidates</div></div><span style="font-size:9px;padding:2px 7px;border-radius:10px;background:'+sc+'18;color:'+sc+';font-weight:600;flex-shrink:0;margin-left:6px">'+esc(o.status)+'</span></div>';
  });
  h+='</div>';
}

// Documents & Coverage
if(docs.length){
  h+='<div class="card"><div class="card-head"><div class="card-title">Documents</div><div class="card-count">'+docs.length+'</div></div>';
  h+=cappedList(docs, 6, function(d){
    return '<div class="drow">'+(d.source_url?'<a href="'+esc(d.source_url)+'" target="_blank" style="font-size:12px">'+esc((d.title||'Untitled').slice(0,60))+'</a>':'<span style="font-size:12px;font-weight:500">'+esc((d.title||'Untitled').slice(0,60))+'</span>')+'<div class="dm" style="font-size:10px">'+esc(d.source_name||d.source_type||'')+' · '+fmtD(d.published_at)+'</div></div>';
  });
  h+='</div>';
}

// Placements & Revenue (subordinate position)
if(pls.length||c.is_client){
// Case Studies
if(csLib.length){
  h+='<div class="card"><div class="card-head"><div class="card-title">Past Engagements</div><div class="card-count">'+csLib.length+' case studies</div></div>';
  h+=cappedList(csLib, 6, function(cs){
    var engLabel={'executive_search':'Exec Search','board_advisory':'Board','leadership_assessment':'Assessment','team_build':'Team Build','succession':'Succession','market_mapping':'Mapping'};
    return '<div style="padding:6px 0;border-bottom:1px solid var(--rule)">' +
      '<div style="font-size:12px;font-weight:500">'+esc(cs.role_title)+'</div>' +
      '<div style="font-size:10px;color:var(--ink-3)">' +
        (cs.engagement_type?'<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:var(--blue-soft);color:var(--blue);margin-right:4px">'+esc(engLabel[cs.engagement_type]||cs.engagement_type)+'</span>':'')+
        (cs.year?cs.year+' · ':'')+
        (cs.seniority_level?esc(cs.seniority_level)+' · ':'')+
        (cs.status==='draft'?'<span style="color:var(--ink-4)">draft</span>':'<span style="color:var(--emerald)">'+esc(cs.status)+'</span>')+
      '</div>' +
      (cs.challenge?'<div style="font-size:11px;color:var(--ink-3);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(cs.challenge)+'</div>':'')+
      ((cs.themes||[]).length?'<div style="margin-top:3px;display:flex;gap:3px;flex-wrap:wrap">'+(cs.themes||[]).slice(0,4).map(function(t){return '<span style="font-size:8px;padding:1px 5px;border-radius:4px;background:var(--surface-cool);color:var(--ink-4)">'+esc(t)+'</span>'}).join('')+'</div>':'')+
    '</div>';
  });
  h+='<div style="margin-top:6px"><a href="/case-studies.html" style="font-size:11px;color:var(--blue);text-decoration:none">View full library →</a></div>';
  h+='</div>';
}

  h+='<div class="card"><div class="card-head"><div class="card-title">Revenue</div><div class="card-count">'+pls.length+' placements</div></div>';
  if(totalFees)h+='<div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--emerald);margin-bottom:8px">'+money(totalFees)+' total revenue</div>';
  if(!pls.length)h+='<div style="font-size:12px;color:var(--ink-4)">No placements recorded</div>';
  else h+=cappedList(pls, 6, function(pl){
    return '<div class="plrow"><div class="plinfo"><div class="plrole" style="font-size:12px">'+esc(pl.role_title||pl.candidate_name||'Placement')+'</div><div class="pldet" style="font-size:10px">'+(pl.candidate_name?esc(pl.candidate_name)+' · ':'')+fmtD(pl.placement_date)+'</div></div><div class="plfee">'+money(pl.placement_fee)+'</div></div>';
  });
  h+='</div>';
}

// Details
h+='<div class="card"><div class="card-head"><div class="card-title">Details</div></div><div style="font-size:12px;color:var(--ink-2);line-height:2">';
if(c.sector)h+='<div><span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-4);font-weight:700">Sector</span><br>'+esc(c.sector)+(c.sub_sector?' / '+esc(c.sub_sector):'')+'</div>';
if(c.geography)h+='<div><span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-4);font-weight:700">Geography</span><br>'+esc(c.geography)+'</div>';
if(c.employee_count_band)h+='<div><span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-4);font-weight:700">Size</span><br>'+esc(c.employee_count_band)+'</div>';
if(c.domain)h+='<div><span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-4);font-weight:700">Website</span><br><a href="https://'+esc(c.domain)+'" target="_blank" style="color:var(--blue);text-decoration:none">'+esc(c.domain)+'</a></div>';
if(c.aliases&&c.aliases.length)h+='<div><span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-4);font-weight:700">Also known as</span><br>'+c.aliases.map(function(a){return esc(a)}).join(', ')+'</div>';
h+='</div></div>';

h+='</div>'; // close card-grid
document.getElementById('app').innerHTML=h;

// Deep-link: scroll to shared signal if ?signal=xxx in URL
var sharedSig = new URLSearchParams(location.search).get('signal');
if (sharedSig) {
  setTimeout(function() {
    var el = document.getElementById('signal-' + sharedSig);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.boxShadow = '0 0 0 3px var(--blue)';
      setTimeout(function() { el.style.boxShadow = ''; }, 3000);
    }
  }, 300);
}
})();

async function enrichCompany() {
  const btn = document.getElementById('enrichBtn');
  if (!btn) return;
  btn.className = 'enrich-btn loading';
  btn.innerHTML = icon('clock') + ' Enriching\u2026';
  try {
    const id = new URLSearchParams(location.search).get('id');
    const r = await fetch('/api/companies/' + id + '/enrich', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + localStorage.getItem('ml_token') },
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    btn.className = 'enrich-btn done';
    btn.textContent = ''+icon('check')+' ' + (data.results.embedding?.message || 'Updated');
    setTimeout(() => location.reload(), 2000);
  } catch (e) {
    btn.className = 'enrich-btn';
    btn.textContent = ''+icon('x')+' ' + e.message;
    setTimeout(() => { btn.textContent = ''+icon('refresh-cw')+' Refresh & Enrich'; }, 3000);
  }
}

async function searchEnrichCompany() {
  var btn = document.getElementById('searchEnrichBtn');
  if (!btn) return;
  btn.className = 'enrich-btn loading';
  btn.innerHTML = icon('clock') + ' Searching news\u2026';
  try {
    var id = new URLSearchParams(location.search).get('id');
    var r = await fetch('/api/companies/' + id + '/search-enrich', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + localStorage.getItem('ml_token') },
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error);
    if (!data.enriched) {
      btn.className = 'enrich-btn';
      btn.innerHTML = icon('search') + ' ' + (data.reason || 'No results');
      setTimeout(function() { btn.innerHTML = icon('search') + ' News Search'; }, 3000);
      return;
    }
    btn.className = 'enrich-btn done';
    var msgs = [];
    if (data.articles_searched) msgs.push(data.articles_searched + ' articles');
    if (data.signals_stored) msgs.push(data.signals_stored + ' signals');
    if (data.leadership_updated) msgs.push(data.leadership_updated + ' leaders');
    btn.innerHTML = icon('check') + ' ' + msgs.join(' \u00B7 ');
    setTimeout(function() { location.reload(); }, 2500);
  } catch (e) {
    btn.className = 'enrich-btn';
    btn.innerHTML = icon('x') + ' ' + e.message;
    setTimeout(function() { btn.innerHTML = icon('search') + ' News Search'; }, 3000);
  }
}
