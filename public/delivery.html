<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Delivery — Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --serif:'Source Serif 4',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  --bg:#FAF9F7;--surface:#FFFFFF;--surface-warm:#F7F5F2;--surface-cool:#F2F4F8;
  --ink:#1A1A1A;--ink-2:#4A4A4A;--ink-3:#7A7A7A;--ink-4:#AAAAAA;
  --rule:#E0DDD8;--rule-bold:#C8C4BE;
  --blue:#2563EB;--blue-soft:#EBF1FE;--emerald:#0D7A50;--emerald-soft:#E8F5EE;
  --amber:#B45309;--amber-soft:#FEF7E8;--rose:#C41D3E;--rose-soft:#FDF0F2;
  --violet:#6D28D9;--violet-soft:#F3EEFE;--radius:8px;
  --shadow-card:0 1px 3px rgba(0,0,0,0.04);--shadow-hover:0 4px 16px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:auto}
.masthead{background:var(--surface);border-bottom:2px solid var(--ink);padding:0 clamp(14px,3vw,40px);position:sticky;top:0;z-index:100}
.masthead-top{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:1400px;margin:0 auto}
.masthead-logo{font-family:var(--serif);font-size:20px;font-weight:600;text-decoration:none;color:inherit}
.masthead-logo em{font-style:italic;color:var(--ink-3)}
.masthead-nav{display:flex;gap:2px}
.masthead-nav a{font-size:12px;font-weight:500;color:var(--ink-3);text-decoration:none;padding:6px 14px;border-radius:6px;transition:all .15s}
.masthead-nav a:hover{color:var(--ink);background:var(--surface-warm)}
.masthead-nav a.active{color:var(--ink);background:var(--surface-warm);font-weight:600}
.masthead-user{width:32px;height:32px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer}

.page{max-width:1400px;margin:0 auto;padding:24px clamp(14px,3vw,40px) 60px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-family:var(--serif);font-size:24px;font-weight:600}
.page-count{font-family:var(--mono);font-size:12px;color:var(--ink-4)}

.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:20px;min-height:calc(100vh - 160px)}
.column{min-width:260px;max-width:300px;flex:1;display:flex;flex-direction:column}
.col-header{padding:10px 12px;border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--rule);border-bottom:2px solid;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.col-header h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3)}
.col-count{font-family:var(--mono);font-size:10px;color:var(--ink-4);background:var(--surface-warm);padding:2px 7px;border-radius:10px}
.col-body{flex:1;background:var(--surface-warm);border:1px solid var(--rule);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:8px;display:flex;flex-direction:column;gap:8px;min-height:100px}

.card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);padding:10px 12px;cursor:grab;transition:box-shadow .15s,border-color .15s;font-size:12px}
.card:hover{box-shadow:var(--shadow-hover);border-color:var(--rule-bold)}
.card.sortable-chosen{box-shadow:var(--shadow-hover);opacity:.9}
.card-title{font-weight:600;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-client{font-size:11px;color:var(--ink-3);margin-bottom:6px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.card-pill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block}
.pill-blue{background:var(--blue-soft);color:var(--blue)}
.pill-emerald{background:var(--emerald-soft);color:var(--emerald)}
.pill-amber{background:var(--amber-soft);color:var(--amber)}
.pill-violet{background:var(--violet-soft);color:var(--violet)}
.pill-grey{background:var(--surface-warm);color:var(--ink-3)}
.pill-rose{background:var(--rose-soft);color:var(--rose)}
.team-row{display:flex;gap:3px;margin-top:6px;align-items:center}
.team-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;border:1.5px solid var(--surface)}
.team-lead{background:var(--blue-soft);color:var(--blue);border-color:var(--blue)}
.team-member{background:var(--surface-warm);color:var(--ink-3)}
.card-opps{font-size:10px;color:var(--ink-4);margin-top:4px}
.card-fee{font-size:10px;font-family:var(--mono);color:var(--ink-3);margin-top:3px}

.col-scoping .col-header{border-bottom-color:var(--ink-4)}
.col-proposal .col-header{border-bottom-color:var(--blue)}
.col-active .col-header{border-bottom-color:var(--emerald)}
.col-on_hold .col-header{border-bottom-color:var(--amber)}
.col-completed .col-header{border-bottom-color:var(--violet)}
.col-cancelled .col-header{border-bottom-color:var(--rose)}

.empty-col{font-size:11px;color:var(--ink-4);text-align:center;padding:24px 8px}
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-top">
    <a href="/index.html" class="masthead-logo"id="mastheadLogo">Signals</a>
    <nav class="masthead-nav">
      <a href="/index.html">Signals</a>
      <a href="/people.html">People</a>
      <a href="/companies.html">Companies</a>
      <a href="/dispatches.html">Dispatch</a>
      <a href="/pipeline.html">Pipeline</a>
      <a href="/delivery.html" class="active">Delivery</a>
      <a href="/placements.html">Revenue</a>
    </nav>
    <div class="masthead-user" id="userAvatar">?</div>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Project Delivery</div>
      <div style="font-size:12px;color:var(--ink-3);margin-top:2px">Drag projects between stages. Multi-party team visibility.</div>
    </div>
    <div class="page-count" id="totalCount">Loading...</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <select id="filterUser" onchange="loadBoard()" style="font-family:var(--sans);font-size:11px;padding:5px 10px;border:1px solid var(--rule);border-radius:6px;background:var(--surface);color:var(--ink-2);cursor:pointer">
      <option value="">All Team Members</option>
    </select>
    <input id="filterLocation" type="text" placeholder="Location..." onkeydown="if(event.key==='Enter')loadBoard()"
      style="font-family:var(--sans);font-size:11px;padding:5px 10px;border:1px solid var(--rule);border-radius:6px;background:var(--surface);color:var(--ink-2);width:140px">
    <input id="filterSearch" type="text" placeholder="Search projects..." onkeydown="if(event.key==='Enter')loadBoard()"
      style="font-family:var(--sans);font-size:11px;padding:5px 10px;border:1px solid var(--rule);border-radius:6px;background:var(--surface);color:var(--ink-2);width:180px">
    <button onclick="clearFilters()" style="font-family:var(--sans);font-size:10px;padding:4px 10px;border:1px solid var(--rule);border-radius:6px;background:transparent;color:var(--ink-4);cursor:pointer">Clear</button>
  </div>
  <div class="board" id="board">
    <div style="padding:40px;color:var(--ink-3)">Loading projects...</div>
  </div>
</div>

<script>
function getToken(){return localStorage.getItem('ml_token')}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(d){if(!d)return'';var ms=Date.now()-new Date(d).getTime();if(ms<86400000)return'today';if(ms<604800000)return Math.floor(ms/86400000)+'d ago';return new Date(d).toLocaleDateString()}
function currency(n,c){return(c||'AUD')+' '+(parseInt(n)||0).toLocaleString()}

async function api(url,opts){
  opts=opts||{};var token=getToken();
  var r=await fetch(url,Object.assign({},opts,{headers:Object.assign({'Content-Type':'application/json'},token?{'Authorization':'Bearer '+token}:{},opts.headers||{}),body:opts.body?JSON.stringify(opts.body):undefined}));
  if(r.status===401){localStorage.removeItem('ml_token');window.location='/index.html';throw new Error('Unauthorized')}
  if(!r.ok){var e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||'Failed')}
  return r.json();
}

var COLUMNS=[
  {key:'scoping',label:'Scoping',cls:'col-scoping'},
  {key:'proposal',label:'Proposal',cls:'col-proposal'},
  {key:'active',label:'Active',cls:'col-active'},
  {key:'on_hold',label:'On Hold',cls:'col-on_hold'},
  {key:'completed',label:'Completed',cls:'col-completed'},
  {key:'cancelled',label:'Cancelled',cls:'col-cancelled'},
];

function renderTeam(team){
  if(!team||!team.length)return'';
  var html='<div class="team-row">';
  team.slice(0,5).forEach(function(m){
    var ini=(m.name||'').split(' ').map(function(w){return w[0]}).join('').slice(0,2);
    var cls=m.role==='lead'?'team-lead':'team-member';
    html+='<div class="team-av '+cls+'" title="'+esc(m.name)+' ('+m.role+')">'+ini+'</div>';
  });
  if(team.length>5)html+='<span style="font-size:9px;color:var(--ink-4)">+'+( team.length-5)+'</span>';
  html+='</div>';
  return html;
}

function renderOpps(opps){
  if(!opps||!opps.length)return'';
  var active=opps.filter(function(o){return o.status!=='placed'&&o.status!=='cancelled'});
  var placed=opps.filter(function(o){return o.status==='placed'});
  var parts=[];
  if(active.length)parts.push(active.length+' active search'+(active.length>1?'es':''));
  if(placed.length)parts.push(placed.length+' placed');
  var totalCands=opps.reduce(function(s,o){return s+(parseInt(o.candidates)||0)},0);
  if(totalCands)parts.push(totalCands+' candidates');
  return parts.length?'<div class="card-opps">'+parts.join(' · ')+'</div>':'';
}

var _usersLoaded=false;

function clearFilters(){
  document.getElementById('filterUser').value='';
  document.getElementById('filterLocation').value='';
  document.getElementById('filterSearch').value='';
  loadBoard();
}

function populateUsers(users){
  if(_usersLoaded||!users)return;
  _usersLoaded=true;
  var sel=document.getElementById('filterUser');
  users.forEach(function(u){var o=document.createElement('option');o.value=u.id;o.textContent=u.name;sel.appendChild(o)});
}

async function loadBoard(){
  try{
    var params=new URLSearchParams();
    var userId=document.getElementById('filterUser').value;
    var location=document.getElementById('filterLocation').value.trim();
    var q=document.getElementById('filterSearch').value.trim();
    if(userId)params.set('user_id',userId);
    if(location)params.set('location',location);
    if(q)params.set('q',q);
    var qs=params.toString();
    var data=await api('/api/delivery/board'+(qs?'?'+qs:''));
    if(data.users)populateUsers(data.users);
    var cols=data.columns;
    document.getElementById('totalCount').textContent=data.total+' projects';

    var html='';
    COLUMNS.forEach(function(col){
      var items=cols[col.key]||[];
      html+='<div class="column '+col.cls+'">';
      html+='<div class="col-header"><h3>'+col.label+'</h3><span class="col-count">'+items.length+'</span></div>';
      html+='<div class="col-body" data-status="'+col.key+'">';
      if(!items.length)html+='<div class="empty-col">No projects</div>';
      items.forEach(function(p){
        html+='<div class="card" data-id="'+p.id+'" data-status="'+p.status+'">';
        html+='<div class="card-title">'+esc(p.name||p.code||'Untitled')+'</div>';
        html+='<div class="card-client">'+esc(p.client_name||p.company_name||'No client')+'</div>';
        html+='<div class="card-meta">';
        if(p.fee_amount)html+='<span class="card-pill pill-emerald">'+currency(p.fee_amount,p.currency)+'</span>';
        if(p.fee_type)html+='<span class="card-pill pill-grey">'+esc(p.fee_type)+'</span>';
        if(parseInt(p.placements)>0)html+='<span class="card-pill pill-violet">'+p.placements+' placed</span>';
        html+='</div>';
        html+=renderTeam(p.team);
        html+=renderOpps(p.opportunities);
        if(p.lead_name)html+='<div style="font-size:10px;color:var(--ink-4);margin-top:3px">Lead: '+esc(p.lead_name)+'</div>';
        html+='</div>';
      });
      html+='</div></div>';
    });

    document.getElementById('board').innerHTML=html;

    // Init SortableJS
    document.querySelectorAll('.col-body').forEach(function(el){
      new Sortable(el,{
        group:'delivery',
        animation:150,
        ghostClass:'sortable-ghost-class',
        chosenClass:'sortable-chosen',
        onEnd:function(evt){
          var cardEl=evt.item;
          var newStatus=evt.to.dataset.status;
          var oldStatus=cardEl.dataset.status;
          if(newStatus===oldStatus)return;
          var id=cardEl.dataset.id;
          cardEl.dataset.status=newStatus;
          api('/api/delivery/'+id+'/status',{method:'PATCH',body:{status:newStatus}}).catch(function(e){
            alert('Failed: '+e.message);
            loadBoard();
          });
          document.querySelectorAll('.col-body').forEach(function(c){
            c.previousElementSibling.querySelector('.col-count').textContent=c.querySelectorAll('.card').length;
          });
        }
      });
    });
  }catch(e){
    document.getElementById('board').innerHTML='<div style="padding:40px;color:var(--rose)">Failed: '+esc(e.message)+'</div>';
  }
}

(function(){
  if(!getToken()){window.location='/index.html';return}
  try{var u=JSON.parse(localStorage.getItem('ml_user')||'{}');document.getElementById('userAvatar').textContent=(u.name||'').split(' ').map(function(w){return w[0]}).join('').slice(0,2)||'?'}catch(e){}
  loadBoard();
})();
</script>
<script src="/terminology.js"></script>
<script src="/js/brand.js"></script>
</body>
</html>
